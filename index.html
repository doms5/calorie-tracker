<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack Pro</title>

<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text";
  background: #f2f2f7;
}

/* HEADER */
.header {
  background: white;
  padding: 14px;
  font-size: 20px;
  font-weight: 700;
  text-align: center;
  border-bottom: 1px solid #eee;
}

/* PAGES */
.page { display:none; padding-bottom: 80px; }
.active { display:block; }

/* CARDS */
.card {
  background: white;
  margin: 12px;
  padding: 16px;
  border-radius: 18px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.05);
}

/* TEXT */
.big { font-size: 34px; font-weight: 800; }
.small { font-size: 12px; color: #777; }

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: #007aff;
  color: white;
  font-weight: 600;
}

/* TAB BAR */
.tabbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  background: white;
  border-top: 1px solid #ddd;
}

.tab {
  flex: 1;
  text-align: center;
  line-height: 60px;
  font-weight: 600;
  color: #888;
}

.tab.active {
  color: #007aff;
}

/* ITEM */
.item {
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #eee;
}

/* CALENDAR GRID */
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.day {
  background: #f0f0f5;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  font-size: 12px;
  cursor: pointer;
}

.day.active {
  background: #007aff;
  color: white;
}

</style>

</head>

<body>

<div class="header">🔥 FitTrack Pro</div>

<!-- ================= TODAY ================= -->
<div id="home" class="page active">

  <div class="card">
    <div class="big" id="total">0 calories</div>
    <div class="small">Today: <span id="dateLabel"></span></div>
  </div>

  <div class="card">
    <div id="list"></div>
  </div>

</div>

<!-- ================= HISTORY ================= -->
<div id="history" class="page">

  <div class="card">
    <div class="small">Select a Day</div>
    <div class="calendar" id="calendar"></div>
  </div>

  <div class="card">
    <div class="big" id="historyTotal">0 calories</div>
    <div id="historyList"></div>
  </div>

</div>

<!-- ================= SCAN ================= -->
<div id="scan" class="page">

  <div class="card">
    <button onclick="startScan()">Scan Barcode</button>
    <div id="scanner"></div>
  </div>

</div>

<!-- TAB BAR -->
<div class="tabbar">
  <div class="tab active" onclick="nav('home')">Today</div>
  <div class="tab" onclick="nav('history')">History</div>
  <div class="tab" onclick="nav('scan')">Scan</div>
</div>

<script>

const today = new Date().toISOString().split("T")[0];

let db = JSON.parse(localStorage.getItem("db") || "{}");
if (!db[today]) db[today] = [];

let selectedDate = today;

/* SAVE */
function save() {
  localStorage.setItem("db", JSON.stringify(db));
}

/* ================= TODAY RENDER ================= */
function renderToday() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  let total = 0;

  db[today].forEach(i => {
    total += i.calories;

    list.innerHTML += `
      <div class="item">
        <span>${i.name}</span>
        <span>${i.calories}</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total + " calories";
  document.getElementById("dateLabel").innerText = today;
}

/* ================= HISTORY CALENDAR ================= */
function renderCalendar() {
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  let days = Object.keys(db).sort().slice(-30); // last 30 days

  days.forEach(d => {
    const div = document.createElement("div");
    div.className = "day" + (d === selectedDate ? " active" : "");
    div.innerText = d.split("-")[2];

    div.onclick = () => {
      selectedDate = d;
      renderHistory();
      renderCalendar();
    };

    cal.appendChild(div);
  });
}

/* ================= HISTORY VIEW ================= */
function renderHistory() {
  let list = document.getElementById("historyList");
  list.innerHTML = "";

  let total = 0;

  if (!db[selectedDate]) db[selectedDate] = [];

  db[selectedDate].forEach(i => {
    total += i.calories;

    list.innerHTML += `
      <div class="item">
        <span>${i.name}</span>
        <span>${i.calories}</span>
      </div>
    `;
  });

  document.getElementById("historyTotal").innerText =
    selectedDate + " — " + total + " calories";
}

/* ================= ADD FOOD ================= */
function addFood(name, cal) {
  const food = name || "Food";
  const calories = cal || 0;

  db[today].push({ name: food, calories: Number(calories) });

  save();
  renderToday();
}

/* ================= SCAN ================= */
function startScan() {
  const scanner = document.getElementById("scanner");
  scanner.innerHTML = "";

  Quagga.init({
    inputStream: { type:"LiveStream", target:scanner },
    decoder: { readers:["ean_reader","upc_reader"] }
  }, err => {
    if (err) return alert(err);
    Quagga.start();
  });

  Quagga.onDetected(async data => {
    const code = data.codeResult.code;
    Quagga.stop();

    const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    const json = await res.json();

    const p = json.product || {};

    addFood(
      p.product_name || "Food",
      p?.nutriments?.["energy-kcal_100g"] || 0
    );
  });
}

/* ================= NAV ================= */
function nav(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(page).classList.add("active");

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");

  if (page === "history") {
    renderCalendar();
    renderHistory();
  }

  if (page === "home") renderToday();
}

/* INIT */
renderToday();

</script>

</body>
</html>
