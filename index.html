<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FitTrack Elite v8 FIX</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:white;
}

.app{max-width:430px;margin:0 auto;padding-bottom:90px;}

.header{text-align:center;padding:14px;font-weight:800;}

.page{display:none;}
.active{display:block;}

.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  margin:12px;
  padding:16px;
  border-radius:18px;
  backdrop-filter:blur(20px);
}

.big{font-size:40px;font-weight:900;}

input{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  background:linear-gradient(135deg,#3b82f6,#06b6d4);
  color:white;
  font-weight:700;
}

.red{
  background:linear-gradient(135deg,#ef4444,#dc2626);
}

/* NAV */
.tabbar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(20px);
}

.tab{
  flex:1;
  text-align:center;
  padding:10px;
  font-size:11px;
  color:#94a3b8;
}

.tab.active{color:#38bdf8;}

/* ITEMS */
.item{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

/* MEAL CHECKLIST */
.mealItem{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.08);
  cursor:pointer;
}

.small{
  font-size:12px;
  opacity:0.7;
}

</style>

</head>

<body>

<div class="app">

<div class="header">🔥 FitTrack Elite v8 FIX</div>

<!-- HOME -->
<div id="home" class="page active">

  <div class="card">
    <div class="big" id="total">0</div>
    <div>Calories Today</div>

    <button class="red" onclick="resetDay()">Reset Day</button>
  </div>

  <div class="card">
    <div id="list"></div>
  </div>

</div>

<!-- SCAN -->
<div id="scan" class="page">

  <div class="card">
    <button onclick="startScan()">Scan Barcode</button>
    <div id="scanner"></div>
  </div>

</div>

<!-- MEAL TAB (RESTORED + IMPROVED) -->
<div id="meals" class="page">

  <div class="card">
    <div style="font-size:22px;font-weight:800">🍽 Meal System</div>
    <div class="small">Tap = complete • Edit = modify • Add = expand</div>
  </div>

  <div class="card">
    <div style="font-weight:700">🥣 Breakfast</div>
    <div id="breakfast"></div>
  </div>

  <div class="card">
    <div style="font-weight:700">🍗 Lunch</div>
    <div id="lunch"></div>
  </div>

  <div class="card">
    <div style="font-weight:700">🥩 Dinner</div>
    <div id="dinner"></div>
  </div>

  <div class="card">
    <div style="font-weight:700">🍎 Snack</div>
    <div id="snack"></div>
  </div>

</div>

</div>

<!-- TAB -->
<div class="tabbar">
  <div class="tab active" onclick="nav('home')">Home</div>
  <div class="tab" onclick="nav('scan')">Scan</div>
  <div class="tab" onclick="nav('meals')">Meals</div>
</div>

<script>

const today = new Date().toISOString().split("T")[0];

let db = JSON.parse(localStorage.getItem("db") || "{}");
if(!db[today]) db[today]=[];

function save(){
  localStorage.setItem("db",JSON.stringify(db));
}

/* =========================
   HOME CALORIES
========================= */

function getTotal(){
  let t=0;
  db[today].forEach(i=>t+=Number(i.calories||0));
  return t;
}

function render(){

  let total=0;
  const el=document.getElementById("list");

  el.innerHTML="";

  db[today].forEach(i=>{
    total+=Number(i.calories||0);

    el.innerHTML+=`
      <div class="item">
        <span>${i.name}</span>
        <span>${i.calories}</span>
      </div>
    `;
  });

  document.getElementById("total").innerText=total;
}

/* =========================
   RESET DAY
========================= */

function resetDay(){
  db[today]=[];
  save();
  render();
  renderMeals();
}

/* =========================
   MEAL SYSTEM (RESTORED + BETTER)
========================= */

let meals = JSON.parse(localStorage.getItem("meals") || "null");

if(!meals){
  meals={
    breakfast:[
      {name:"Eggs",calories:140,done:false},
      {name:"Oatmeal",calories:300,done:false}
    ],
    lunch:[
      {name:"Chicken Rice",calories:450,done:false}
    ],
    dinner:[
      {name:"Salmon",calories:400,done:false}
    ],
    snack:[
      {name:"Protein Bar",calories:180,done:false}
    ]
  };
}

function saveMeals(){
  localStorage.setItem("meals",JSON.stringify(meals));
}

/* TOGGLE */
function toggle(meal,i){
  meals[meal][i].done=!meals[meal][i].done;
  saveMeals();
  renderMeals();
}

/* EDIT */
function edit(meal,i){

  let item=meals[meal][i];

  let n=prompt("Edit name",item.name);
  let c=prompt("Edit calories",item.calories);

  if(n!==null) item.name=n;
  if(c!==null) item.calories=Number(c);

  saveMeals();
  renderMeals();
}

/* ADD */
function add(meal){

  let n=prompt("Food name");
  let c=prompt("Calories");

  if(!n||!c) return;

  meals[meal].push({
    name:n,
    calories:Number(c),
    done:false
  });

  saveMeals();
  renderMeals();
}

/* RENDER MEALS (FIXED) */
function renderMeals(){

  function fill(id,meal){

    const el=document.getElementById(id);
    if(!el) return;

    el.innerHTML="";

    meals[meal].forEach((i,idx)=>{

      el.innerHTML+=`
        <div class="mealItem"
             style="opacity:${i.done?0.4:1};
                    text-decoration:${i.done?'line-through':'none'}">

          <span onclick="toggle('${meal}',${idx})">${i.name}</span>
          <span onclick="toggle('${meal}',${idx})">${i.calories}</span>
          <span style="color:#60a5fa;font-size:12px"
                onclick="edit('${meal}',${idx})">edit</span>

        </div>
      `;
    });

    el.innerHTML+=`<button onclick="add('${meal}')">+ Add Item</button>`;
  }

  fill("breakfast","breakfast");
  fill("lunch","lunch");
  fill("dinner","dinner");
  fill("snack","snack");
}

/* =========================
   SCANNER
========================= */

let scanning=false;

function startScan(){

  if(scanning) return;
  scanning=true;

  const scanner=document.getElementById("scanner");

  Quagga.init({
    inputStream:{type:"LiveStream",target:scanner},
    decoder:{readers:["ean_reader","upc_reader"]}
  },err=>{
    if(err){scanning=false;return;}
    Quagga.start();
  });

  Quagga.onDetected(async d=>{

    if(!scanning) return;
    scanning=false;

    Quagga.stop();

    const code=d.codeResult.code;

    const res=await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    const json=await res.json();

    const p=json.product||{};

    db[today].push({
      name:p.product_name||"Scanned Food",
      calories:Number(p?.nutriments?.["energy-kcal_100g"]||0)
    });

    save();
    render();
  });
}

/* NAV */
function nav(p){

  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById(p).classList.add("active");

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
}

/* INIT */
render();
renderMeals();

</script>

</body>
</html>
