<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack Pro</title>

<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="apple-touch-icon" href="icon.png">

<style>

body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro";
  background:#f2f2f7;
}

/* SPLASH / ONBOARDING */
#onboard {
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#007aff,#34c759);
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

#onboard h1 { font-size:34px; margin:0; }
#onboard button {
  margin-top:20px;
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:white;
  color:#007aff;
  font-weight:700;
}

/* APP */
.app { display:none; }

.header {
  text-align:center;
  padding:14px;
  font-weight:700;
  background:white;
  border-bottom:1px solid #eee;
}

/* PAGE */
.page { display:none; padding-bottom:90px; }
.active { display:block; }

/* CARD */
.card {
  background:white;
  margin:12px;
  padding:16px;
  border-radius:18px;
  box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#007aff;
  color:white;
  font-weight:600;
}

/* TAB BAR */
.tabbar {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:white;
  border-top:1px solid #ddd;
}

.tab {
  flex:1;
  text-align:center;
  padding:10px 0;
  font-size:11px;
  color:#8e8e93;
}

.tab.active { color:#007aff; }

</style>

</head>

<body>

<!-- ONBOARDING -->
<div id="onboard">
  <h1>FitTrack Pro</h1>
  <p>Track calories. Build streaks. Stay consistent.</p>
  <button onclick="startApp()">Get Started</button>
</div>

<!-- APP -->
<div class="app" id="app">

<div class="header">🔥 FitTrack Pro</div>

<div id="home" class="page active">
  <div class="card">
    <h2 id="cal">0 calories</h2>
    <input id="food" placeholder="Food">
    <input id="cals" type="number" placeholder="Calories">
    <button onclick="add()">Add</button>
  </div>

  <div class="card" id="list"></div>
</div>

<div id="scan" class="page">
  <div class="card">
    <button onclick="alert('scanner placeholder')">Scan Barcode</button>
  </div>
</div>

<div id="meals" class="page">
  <div class="card">
    <label><input type="checkbox" onchange="addMeal('Eggs',140)"> Eggs</label><br>
    <label><input type="checkbox" onchange="addMeal('Chicken',200)"> Chicken</label>
  </div>
</div>

<!-- TAB -->
<div class="tabbar">
  <div class="tab active" onclick="nav('home')">Home</div>
  <div class="tab" onclick="nav('scan')">Scan</div>
  <div class="tab" onclick="nav('meals')">Meals</div>
</div>

</div>

<script>

let items = JSON.parse(localStorage.getItem("items")||"[]");

function startApp(){
  document.getElementById("onboard").style.display="none";
  document.getElementById("app").style.display="block";
  render();
}

function add(){
  items.push({
    name:food.value,
    calories:+cals.value
  });
  localStorage.setItem("items",JSON.stringify(items));
  render();
}

function addMeal(n,c){
  items.push({name:n,calories:c});
  localStorage.setItem("items",JSON.stringify(items));
  render();
}

function render(){
  let total=0;
  list.innerHTML="";

  items.forEach(i=>{
    total+=i.calories;
    list.innerHTML+=`<div>${i.name} - ${i.calories}</div>`;
  });

  cal.innerText=total + " calories";
}

function nav(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById(p).classList.add("active");
}

render();

</script>

</body>
</html>
