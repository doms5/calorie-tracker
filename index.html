<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack Stable v4</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>

body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
  background:#f2f2f7;
}

/* HEADER */
.header {
  text-align:center;
  padding:14px;
  font-weight:700;
  background:white;
  border-bottom:1px solid #eee;
}

/* PAGES */
.page { display:none; padding-bottom:100px; }
.active { display:block; }

/* CARD */
.card {
  background:white;
  margin:12px;
  padding:16px;
  border-radius:20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

/* TEXT */
.big { font-size:34px; font-weight:800; }
.small { font-size:12px; color:#777; }

/* INPUT */
input {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:12px;
  border:1px solid #ddd;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  background:#007aff;
  color:white;
  font-weight:600;
}

.red { background:#ff3b30; }

/* LIST */
.item {
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #eee;
}

.delete {
  color:#ff3b30;
  font-size:12px;
}

/* TAB */
.tabbar {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:white;
  border-top:1px solid #ddd;
}

.tab {
  flex:1;
  text-align:center;
  padding:10px 0;
  font-size:11px;
  color:#8e8e93;
  font-weight:600;
}

.tab.active { color:#007aff; }

</style>

</head>

<body>

<div class="header">🔥 FitTrack Stable v4</div>

<!-- HOME -->
<div id="home" class="page active">

  <div class="card">
    <div class="big" id="total">0 calories</div>

    <div class="small">📅 <span id="date"></span></div>

    <div class="small">
      🎯 Goal:
      <input id="goalInput" type="number" onchange="updateGoal()">
    </div>

    <button class="red" onclick="resetDay()">Reset Day</button>
  </div>

  <div class="card">
    <div class="small">Macros</div>
    <div>Protein: <span id="p">0</span>g</div>
    <div>Carbs: <span id="c">0</span>g</div>
    <div>Fat: <span id="f">0</span>g</div>
  </div>

  <div class="card">
    <div id="list"></div>
  </div>

</div>

<!-- SCAN -->
<div id="scan" class="page">

  <div class="card">
    <button onclick="scan()">Scan Barcode</button>
    <div id="scanner"></div>
  </div>

  <div class="card">

    <input id="food" placeholder="Food">
    <input id="cal" type="number" placeholder="Calories">
    <input id="pro" type="number" placeholder="Protein">
    <input id="car" type="number" placeholder="Carbs">
    <input id="fat" type="number" placeholder="Fat">

    <button onclick="add()">Add Food</button>

  </div>

</div>

<!-- MEALS -->
<div id="meals" class="page">

  <div class="card">

    <h3>Breakfast</h3>
    <label><input type="checkbox" onchange="meal('Eggs',140)"> Eggs</label>

    <h3>Lunch</h3>
    <label><input type="checkbox" onchange="meal('Chicken',200)"> Chicken</label>

    <h3>Dinner</h3>
    <label><input type="checkbox" onchange="meal('Salmon',300)"> Salmon</label>

    <h3>Snack</h3>
    <label><input type="checkbox" onchange="meal('Protein Bar',180)"> Protein Bar</label>

  </div>

</div>

<!-- TAB -->
<div class="tabbar">

  <div class="tab active" onclick="nav('home')">Home</div>
  <div class="tab" onclick="nav('scan')">Scan</div>
  <div class="tab" onclick="nav('meals')">Meals</div>

</div>

<script>

const today = new Date().toISOString().split("T")[0];

let db = JSON.parse(localStorage.getItem("db") || "{}");
if (!db[today]) db[today] = [];

let goal = Number(localStorage.getItem("goal") || 2000);

document.getElementById("date").innerText = today;
document.getElementById("goalInput").value = goal;

/* SAVE */
function save(){
  localStorage.setItem("db", JSON.stringify(db));
  localStorage.setItem("goal", goal);
}

/* UPDATE GOAL */
function updateGoal(){
  goal = Number(goalInput.value);
  save();
  render();
}

/* ADD FOOD */
function add(){

  db[today].push({
    name:food.value,
    calories:+cal.value,
    protein:+pro.value||0,
    carbs:+car.value||0,
    fat:+fat.value||0
  });

  save();
  render();
}

/* DELETE */
function del(i){
  db[today].splice(i,1);
  save();
  render();
}

/* RESET DAY */
function resetDay(){
  db[today] = [];
  save();
  render();
}

/* MEALS */
function meal(n,c){ addFood(n,c); }

/* RENDER */
function render(){

  let total=0,p=0,c=0,f=0;
  list.innerHTML="";

  db[today].forEach((i,idx)=>{

    total+=i.calories;
    p+=i.protein;
    c+=i.carbs;
    f+=i.fat;

    list.innerHTML+=`
      <div class="item">
        <span>${i.name}</span>
        <span>${i.calories}</span>
        <span class="delete" onclick="del(${idx})">x</span>
      </div>
    `;
  });

  totalDisplay.innerText = total + " calories";
  p.innerText = p;
  c.innerText = c;
  f.innerText = f;

}

/* SCAN */
function scan(){

  const scanner=document.getElementById("scanner");

  Quagga.init({
    inputStream:{type:"LiveStream",target:scanner},
    decoder:{readers:["ean_reader","upc_reader"]}
  },err=>{ if(err) return alert(err); Quagga.start(); });

  Quagga.onDetected(async d=>{

    let code=d.codeResult.code;
    Quagga.stop();

    let r=await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    let j=await r.json();

    let p=j.product||{};

    db[today].push({
      name:p.product_name||"Food",
      calories:p?.nutriments?.["energy-kcal_100g"]||0,
      protein:0,carbs:0,fat:0
    });

    save(); render();
  });
}

/* NAV */
function nav(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById(p).classList.add("active");
}

render();

</script>

</body>
</html>
