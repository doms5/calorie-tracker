<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack Pro</title>

<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="apple-touch-icon" href="icon.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text";
  background: #f2f2f7;
}

.header {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  padding: 14px;
  font-size: 20px;
  font-weight: 700;
  text-align: center;
  position: sticky;
  top: 0;
}

.page { display:none; padding-bottom: 90px; }
.active { display:block; }

.card {
  background: white;
  margin: 12px;
  padding: 16px;
  border-radius: 20px;
  box-shadow: 0 6px 16px rgba(0,0,0,0.05);
}

.big {
  font-size: 34px;
  font-weight: 800;
}

.small {
  font-size: 12px;
  color: #777;
}

.progress {
  height: 10px;
  background: #eee;
  border-radius: 20px;
}

.fill {
  height: 100%;
  width: 0%;
  background: #34c759;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 14px;
  border: none;
  font-weight: 600;
  color: white;
  background: #007aff;
}

.green { background:#34c759; }
.red { background:#ff3b30; }

.item {
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #eee;
}

.delete {
  color:#ff3b30;
  font-size:12px;
}

/* TAB */
.tabbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display:flex;
  background:white;
  border-top:1px solid #ddd;
}

.tab {
  flex:1;
  text-align:center;
  line-height:60px;
  font-weight:600;
  color:#888;
}

.tab.active {
  color:#007aff;
}

</style>

</head>

<body>

<div class="header">🔥 FitTrack Pro</div>

<!-- HOME -->
<div id="home" class="page active">

  <div class="card">
    <div class="big" id="total">0 calories</div>
    <div class="small">Today: <span id="date"></span></div>

    <div class="progress">
      <div class="fill" id="bar"></div>
    </div>

    <button onclick="resetDay()" class="red">Reset Today</button>
  </div>

  <div class="card">
    <div id="list"></div>
  </div>

</div>

<!-- SCAN -->
<div id="scanPage" class="page">

  <div class="card">
    <button onclick="startScan()">Scan Barcode</button>
    <div id="scanner"></div>
  </div>

  <div class="card">
    <input id="food" placeholder="Food">
    <input id="calories" type="number" placeholder="Calories">
    <button onclick="addFood()">Add Manual</button>
  </div>

</div>

<!-- MEALS -->
<div id="mealPage" class="page">

  <div class="card">
    <h3>Breakfast</h3>
    <label><input type="checkbox" onchange="meal('Eggs',140)"> Eggs</label><br>
    <label><input type="checkbox" onchange="meal('Oatmeal',150)"> Oatmeal</label>
  </div>

  <div class="card">
    <h3>Lunch</h3>
    <label><input type="checkbox" onchange="meal('Chicken',200)"> Chicken</label><br>
    <label><input type="checkbox" onchange="meal('Rice',250)"> Rice</label>
  </div>

  <div class="card">
    <h3>Dinner</h3>
    <label><input type="checkbox" onchange="meal('Salmon',300)"> Salmon</label><br>
    <label><input type="checkbox" onchange="meal('Veggies',80)"> Veggies</label>
  </div>

  <div class="card">
    <h3>Snack</h3>
    <label><input type="checkbox" onchange="meal('Protein Bar',180)"> Protein Bar</label>
  </div>

</div>

<!-- TAB -->
<div class="tabbar">
  <div class="tab active" onclick="nav('home')">Home</div>
  <div class="tab" onclick="nav('scanPage')">Scan</div>
  <div class="tab" onclick="nav('mealPage')">Meals</div>
</div>

<script>

const GOAL = 2000;
const today = new Date().toISOString().split("T")[0];

let db = JSON.parse(localStorage.getItem("db") || "{}");

if (!db[today]) db[today] = [];

document.getElementById("date").innerText = today;

function save() {
  localStorage.setItem("db", JSON.stringify(db));
}

function getToday() {
  return db[today];
}

/* RENDER */
function render() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  let total = 0;

  getToday().forEach((item, index) => {
    total += item.calories;

    list.innerHTML += `
      <div class="item">
        <span>${item.name}</span>
        <span>${item.calories} cal</span>
        <span class="delete" onclick="removeItem(${index})">delete</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total + " calories";
  document.getElementById("bar").style.width = Math.min((total/GOAL)*100,100) + "%";

  save();
}

/* ADD */
function addFood(name, cal) {
  const food = name || document.getElementById("food").value;
  const calories = cal || document.getElementById("calories").value;

  if (!food || !calories) return;

  db[today].push({ name: food, calories: Number(calories) });

  document.getElementById("food").value = "";
  document.getElementById("calories").value = "";

  render();
}

/* DELETE ITEM */
function removeItem(index) {
  db[today].splice(index, 1);
  render();
}

/* RESET DAY */
function resetDay() {
  db[today] = [];
  render();
}

/* SCAN */
function startScan() {
  const scanner = document.getElementById("scanner");
  scanner.innerHTML = "";

  Quagga.init({
    inputStream: { type:"LiveStream", target:scanner },
    decoder: { readers:["ean_reader","upc_reader"] }
  }, err => {
    if (err) return alert(err);
    Quagga.start();
  });

  Quagga.onDetected(async data => {
    const code = data.codeResult.code;
    Quagga.stop();

    const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    const json = await res.json();
    const p = json.product || {};

    addFood(
      p.product_name || "Food",
      p?.nutriments?.["energy-kcal_100g"] || 0
    );
  });
}

/* MEAL PLAN */
function meal(name, cal) {
  addFood(name, cal);
}

/* NAV */
function nav(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(page).classList.add("active");

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");
}

render();

</script>

</body>
</html>
