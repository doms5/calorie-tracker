<!DOCTYPE html>
<html>
<head>
  <link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial;
  background: #f2f2f7;
}

.header {
  background: white;
  padding: 18px;
  font-size: 22px;
  font-weight: 700;
  position: sticky;
  top: 0;
  border-bottom: 1px solid #eee;
}

.card {
  background: white;
  margin: 12px;
  padding: 16px;
  border-radius: 18px;
}

.title {
  font-size: 14px;
  color: #777;
}

.big {
  font-size: 34px;
  font-weight: 800;
}

.progress {
  height: 10px;
  background: #eee;
  border-radius: 20px;
  overflow: hidden;
  margin-top: 10px;
}

.fill {
  height: 100%;
  width: 0%;
  background: #34c759;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 14px;
  border: none;
  font-size: 16px;
  font-weight: 600;
  color: white;
  background: #007aff;
}

button.green { background: #34c759; }
button.red { background: #ff3b30; }

.item {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid #eee;
}

.small {
  font-size: 12px;
  color: #888;
}
</style>
</head>

<body>

<div class="header">🔥 FitTrack</div>

<!-- DASHBOARD -->
<div class="card">
  <div class="title">Today’s Calories</div>
  <div class="big" id="total">0</div>

  <div class="small">Goal: <span id="goalText">2000</span> calories</div>

  <div class="progress">
    <div class="fill" id="bar"></div>
  </div>
</div>

<!-- INPUT -->
<div class="card">
  <input id="food" placeholder="Food name">
  <input id="calories" type="number" placeholder="Calories">

  <button onclick="addFood()">Add Food</button>
  <button class="green" onclick="scan()">Scan Barcode</button>
  <button class="red" onclick="resetDay()">Reset Day</button>
</div>

<!-- LIST -->
<div class="card">
  <div class="title">Today’s Foods</div>
  <div id="list"></div>
</div>

<!-- SCANNER -->
<div class="card">
  <div id="scanner"></div>
</div>

<script>

let items = JSON.parse(localStorage.getItem("foods") || "[]")
const GOAL = 2000;

function render() {
  let total = 0;
  const list = document.getElementById("list");
  list.innerHTML = "";

  items.forEach(i => {
    total += i.calories;

    list.innerHTML += `
      <div class="item">
        <span>${i.name}</span>
        <span>${i.calories} cal</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("goalText").innerText = GOAL;

  let percent = Math.min((total / GOAL) * 100, 100);
  document.getElementById("bar").style.width = percent + "%";

  localStorage.setItem("foods", JSON.stringify(items));
}

function addFood(name, cal) {
  const food = name || document.getElementById("food").value;
  const calories = cal || document.getElementById("calories").value;

  if (!food || !calories) return;

  items.push({
    name: food,
    calories: Number(calories)
  });

  document.getElementById("food").value = "";
  document.getElementById("calories").value = "";

  render();
}

function resetDay() {
  items = [];
  localStorage.removeItem("foods");
  render();
}

/* BARCODE SCANNER */
function scan() {
  Quagga.init({
    inputStream: {
      type: "LiveStream",
      target: document.querySelector("#scanner"),
      constraints: { facingMode: "environment" }
    },
    decoder: {
      readers: ["ean_reader", "upc_reader"]
    }
  }, err => {
    if (err) return alert(err);
    Quagga.start();
  });

  Quagga.onDetected(async data => {
    const code = data.codeResult.code;
    Quagga.stop();

    const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    const json = await res.json();

    const p = json.product;

    addFood(
      p?.product_name || "Unknown Food",
      p?.nutriments?.energy_kcal_100g || 0
    );

    alert("Added: " + (p?.product_name || "Food"));
  });
}

render();

</script>

</body>
</html>
