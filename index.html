<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FitTrack Elite v14</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a84ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text";
  background:linear-gradient(180deg,#0b0f19,#05070d);
  color:#f5f5f7;
}

/* APP */
.app{max-width:430px;margin:0 auto;padding-bottom:90px;}

/* HEADER */
.header{
  position:sticky;
  top:0;
  background:rgba(20,20,25,0.7);
  backdrop-filter:blur(20px);
  padding:14px;
  text-align:center;
  font-weight:600;
}

/* PAGES ANIMATION */
.page{
  display:none;
  animation:fadeIn 0.25s ease;
}
.active{display:block;}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}

/* CARDS */
.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  margin:12px;
  padding:16px;
  border-radius:16px;
  transition:0.2s;
}

.card:active{transform:scale(0.99);}

/* BIG NUMBER */
.big{font-size:44px;font-weight:700;}

/* SMALL */
.small{font-size:13px;opacity:0.6;}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  background:#0a84ff;
  color:white;
  font-weight:600;
  transition:0.15s;
}

button:active{transform:scale(0.98);}

.red{background:#ff453a;}

/* ITEMS */
.item{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
}

/* MEALS */
.mealItem{
  display:flex;
  gap:10px;
  align-items:center;
  padding:10px 0;
}

/* TAB */
.tabbar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:rgba(18,18,22,0.9);
  backdrop-filter:blur(25px);
}

.tab{
  flex:1;
  text-align:center;
  padding:10px;
  font-size:11px;
  color:#8e8e93;
}

.tab.active{color:#0a84ff;}

/* SCANNER */
.scanLine{
  position:absolute;
  height:2px;
  left:0;
  right:0;
  background:linear-gradient(90deg,transparent,#0a84ff,transparent);
  animation:scanMove 1.5s infinite;
}

@keyframes scanMove{
  0%{transform:translateY(0);}
  50%{transform:translateY(260px);}
  100%{transform:translateY(0);}
}

/* MODAL */
#modal{
  position:fixed;
  bottom:-400px;
  left:0;
  right:0;
  background:rgba(28,28,30,0.95);
  backdrop-filter:blur(20px);
  padding:16px;
  border-top-left-radius:20px;
  border-top-right-radius:20px;
  transition:0.3s;
}

/* CHART */
canvas{margin-top:10px;}

</style>

</head>

<body>

<div class="app">

<div class="header">FitTrack v14</div>

<!-- HOME -->
<div id="home" class="page active">

  <div class="card">
    <div class="big" id="total">0</div>
    <div class="small">Calories Today</div>
    <div class="small">📅 <span id="date"></span></div>
    <div class="small">🔥 Streak: <span id="streak">0</span> days</div>

    <button class="red" onclick="resetDay()">Reset Day</button>
  </div>

  <div class="card">
    <div style="font-weight:600">Weekly Progress</div>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <div id="list"></div>
  </div>

</div>

<!-- SCAN -->
<div id="scan" class="page">

  <div class="card">

    <div style="position:relative;height:260px;background:black;border-radius:16px;overflow:hidden">
      <div id="scanner" style="width:100%;height:100%"></div>
      <div class="scanLine"></div>
    </div>

    <button onclick="startScan()">Start Scan</button>

  </div>

</div>

<!-- MEALS -->
<div id="meals" class="page">

  <div class="card">
    <div style="font-weight:600">Meal Plan</div>
    <div class="small">📅 <span id="mealDate"></span></div>
  </div>

  <div class="card">
    <div id="breakfast"></div>
  </div>

  <div class="card">
    <div id="lunch"></div>
  </div>

  <div class="card">
    <div id="dinner"></div>
  </div>

  <div class="card">
    <div id="snack"></div>
  </div>

</div>

</div>

<!-- MODAL -->
<div id="modal">
  <div id="scanName"></div>
  <input id="scanCalories" type="number">
  <button onclick="confirmAdd()">Add</button>
  <button class="red" onclick="closeModal()">Cancel</button>
</div>

<!-- TAB -->
<div class="tabbar">
  <div class="tab" onclick="nav('home')">Home</div>
  <div class="tab" onclick="nav('scan')">Scan</div>
  <div class="tab" onclick="nav('meals')">Meals</div>
</div>

<script>

/* DATE */
const today = new Date().toISOString().split("T")[0];
document.getElementById("date").innerText = new Date().toLocaleDateString();
document.getElementById("mealDate").innerText = new Date().toLocaleDateString();

/* DATA */
let db = JSON.parse(localStorage.getItem("db")||"{}");
if(!db[today]) db[today]=[];

let meals = JSON.parse(localStorage.getItem("meals")||"null");
if(!meals){
  meals={
    breakfast:[{name:"Eggs",calories:140,done:false}],
    lunch:[{name:"Chicken",calories:400,done:false}],
    dinner:[{name:"Salmon",calories:450,done:false}],
    snack:[{name:"Protein Bar",calories:180,done:false}]
  };
}

let cache = JSON.parse(localStorage.getItem("cache")||"{}");

function save(){
  localStorage.setItem("db",JSON.stringify(db));
}

function saveMeals(){
  localStorage.setItem("meals",JSON.stringify(meals));
}

function saveCache(){
  localStorage.setItem("cache",JSON.stringify(cache));
}

/* HOME */
function render(){

  let total = db[today].reduce((a,b)=>a+Number(b.calories||0),0);
  document.getElementById("total").innerText = total;

  const el=document.getElementById("list");
  el.innerHTML="";

  db[today].forEach(i=>{
    el.innerHTML+=`
      <div class="item">
        <span>${i.name}</span>
        <span>${i.calories}</span>
      </div>`;
  });
}

/* RESET */
function resetDay(){
  db[today]=[];
  save();
  render();
}

/* STREAK (SIMPLE) */
function updateStreak(){
  let days = Object.keys(db).filter(d=>db[d].length>0);
  document.getElementById("streak").innerText = days.length;
}

/* MEALS */
function toggle(m,i){
  meals[m][i].done=!meals[m][i].done;

  if(meals[m][i].done){
    db[today].push(meals[m][i]);
  }

  save();
  saveMeals();
  render();
  renderMeals();
}

/* RENDER MEALS */
function renderMeals(){

  ["breakfast","lunch","dinner","snack"].forEach(m=>{

    const el=document.getElementById(m);
    el.innerHTML="";

    meals[m].forEach((i,idx)=>{
      el.innerHTML+=`
        <div class="mealItem">
          <input type="checkbox"
                 ${i.done?'checked':''}
                 onchange="toggle('${m}',${idx})">
          <span style="flex:1">${i.name}</span>
          <span>${i.calories}</span>
        </div>`;
    });
  });
}

/* SCANNER */
let buffer=null;

function startScan(){

  const scanner=document.getElementById("scanner");

  Quagga.init({
    inputStream:{type:"LiveStream",target:scanner},
    decoder:{readers:["ean_reader","upc_reader"]}
  },err=>{
    if(err) return alert(err);
    Quagga.start();
  });

  Quagga.onDetected(async d=>{

    Quagga.stop();

    const code=d.codeResult.code;

    if(cache[code]){
      open(cache[code]);
      return;
    }

    const res=await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    const json=await res.json();
    const p=json.product||{};

    let kcal=0;
    const n=p.nutriments||{};

    if(n["energy-kcal_100g"]) kcal=n["energy-kcal_100g"];
    else if(n["energy_100g"]) kcal=n["energy_100g"]/4.184;

    const food={
      name:p.product_name||"Food",
      calories:Math.round(kcal||0)
    };

    cache[code]=food;
    saveCache();

    open(food);
  });
}

/* MODAL */
function open(data){
  buffer=data;
  document.getElementById("scanName").innerText=data.name;
  document.getElementById("scanCalories").value=data.calories;
  document.getElementById("modal").style.bottom="0";
}

function closeModal(){
  document.getElementById("modal").style.bottom="-400px";
}

function confirmAdd(){

  db[today].push({
    name:buffer.name,
    calories:Number(document.getElementById("scanCalories").value)
  });

  save();
  render();
  updateStreak();
  closeModal();
}

/* CHART */
function loadChart(){

  let labels=[];
  let data=[];

  Object.keys(db).slice(-7).forEach(d=>{
    labels.push(d);
    data.push(db[d].reduce((a,b)=>a+Number(b.calories||0),0));
  });

  new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:labels,
      datasets:[{data:data}]
    }
  });
}

/* NAV */
function nav(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById(p).classList.add("active");
}

/* INIT */
render();
renderMeals();
loadChart();
updateStreak();

</script>

</body>
</html>
