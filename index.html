<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FitTrack Elite v8</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:white;
}

.app{max-width:430px;margin:0 auto;padding-bottom:90px;}
.header{text-align:center;padding:14px;font-weight:800;}

.page{display:none;}
.active{display:block;}

.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  margin:12px;
  padding:16px;
  border-radius:18px;
  backdrop-filter:blur(20px);
}

.big{font-size:40px;font-weight:900;}

input{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  background:linear-gradient(135deg,#3b82f6,#06b6d4);
  color:white;
  font-weight:700;
}

.red{
  background:linear-gradient(135deg,#ef4444,#dc2626);
}

.item{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

/* TAB */
.tabbar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(20px);
}

.tab{
  flex:1;
  text-align:center;
  padding:10px;
  font-size:11px;
  color:#94a3b8;
}

.tab.active{color:#38bdf8;}

canvas{background:rgba(255,255,255,0.05);border-radius:12px;}

.calendarGrid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:4px;
}

.day{
  text-align:center;
  padding:6px;
  font-size:11px;
  border-radius:6px;
  background:rgba(255,255,255,0.05);
}

.day.active{
  background:#38bdf8;
  color:black;
}

</style>

</head>

<body>

<div class="app">

<div class="header">🔥 FitTrack Elite v8</div>

<!-- HOME -->
<div id="home" class="page active">

  <div class="card">
    <div class="big" id="total">0</div>
    <div>Calories Today</div>
    <button class="red" onclick="resetDay()">Reset Day</button>
  </div>

  <div class="card">
    <canvas id="chart" height="120"></canvas>
  </div>

</div>

<!-- CALENDAR -->
<div id="calendar" class="page">

  <div class="card">
    <div style="font-weight:700">📅 Weekly Calendar</div>
    <div id="calGrid" class="calendarGrid"></div>
  </div>

  <div class="card">
    <div id="dayDetails"></div>
  </div>

</div>

<!-- SCAN -->
<div id="scan" class="page">

  <div class="card">
    <button onclick="startScan()">Scan Barcode</button>
    <div id="scanner"></div>
  </div>

</div>

</div>

<!-- TAB -->
<div class="tabbar">
  <div class="tab active" onclick="nav('home')">Home</div>
  <div class="tab" onclick="nav('scan')">Scan</div>
  <div class="tab" onclick="nav('calendar')">Calendar</div>
</div>

<script>

const today = new Date().toISOString().split("T")[0];

let db = JSON.parse(localStorage.getItem("db") || "{}");
if(!db[today]) db[today]=[];

function save(){
  localStorage.setItem("db",JSON.stringify(db));
}

/* ======================
   CALORIES
====================== */

function getTotal(day=today){
  let t=0;
  (db[day]||[]).forEach(i=>t+=Number(i.calories||0));
  return t;
}

function render(){

  document.getElementById("total").innerText=getTotal();

  drawChart();
  sendNotification();
}

/* ======================
   CHART (7 DAY)
====================== */

function drawChart(){

  const c=document.getElementById("chart");
  const ctx=c.getContext("2d");

  ctx.clearRect(0,0,c.width,c.height);

  let days=[];
  for(let i=6;i>=0;i--){
    let d=new Date();
    d.setDate(d.getDate()-i);
    let key=d.toISOString().split("T")[0];
    days.push(getTotal(key));
  }

  let max=Math.max(...days,1);

  days.forEach((v,i)=>{

    let h=(v/max)*100;

    ctx.fillStyle="#38bdf8";
    ctx.fillRect(i*40+10,100-h,20,h);

  });
}

/* ======================
   CALENDAR
====================== */

function renderCalendar(){

  const grid=document.getElementById("calGrid");
  grid.innerHTML="";

  for(let i=6;i>=0;i--){

    let d=new Date();
    d.setDate(d.getDate()-i);
    let key=d.toISOString().split("T")[0];

    grid.innerHTML+=`
      <div class="day ${key===today?'active':''}"
           onclick="viewDay('${key}')">
        ${d.getDate()}
      </div>
    `;
  }
}

function viewDay(day){

  const el=document.getElementById("dayDetails");

  el.innerHTML=`
    <div class="card">
      <div style="font-weight:700">${day}</div>
      <div>Calories: ${getTotal(day)}</div>
    </div>
  `;
}

/* ======================
   NOTIFICATIONS
====================== */

function sendNotification(){

  if(!("Notification" in window)) return;

  if(Notification.permission==="granted"){
    let total=getTotal();
    if(total<1500){
      new Notification("FitTrack: You are under your calorie goal today.");
    }
  }
}

/* ======================
   RESET
====================== */

function resetDay(){
  db[today]=[];
  save();
  render();
}

/* ======================
   SCANNER (SIMPLIFIED)
====================== */

let scanning=false;

function startScan(){

  if(scanning) return;
  scanning=true;

  const scanner=document.getElementById("scanner");

  Quagga.init({
    inputStream:{type:"LiveStream",target:scanner},
    decoder:{readers:["ean_reader","upc_reader"]}
  },err=>{
    if(err){scanning=false;return;}
    Quagga.start();
  });

  Quagga.onDetected(async d=>{

    if(!scanning) return;
    scanning=false;

    Quagga.stop();

    const code=d.codeResult.code;

    const res=await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    const json=await res.json();

    const p=json.product||{};

    db[today].push({
      name:p.product_name||"Food",
      calories:Number(p?.nutriments?.["energy-kcal_100g"]||0)
    });

    save();
    render();
  });
}

/* ======================
   NAV
====================== */

function nav(p){

  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById(p).classList.add("active");

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
}

/* INIT */

render();
renderCalendar();

/* Ask notification permission */
if("Notification" in window){
  Notification.requestPermission();
}

</script>

</body>
</html>
