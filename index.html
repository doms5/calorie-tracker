<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack Pro</title>

<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="apple-touch-icon" href="icon.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text";
  background: #f2f2f7;
}

.header {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  padding: 14px;
  font-size: 20px;
  font-weight: 700;
  text-align: center;
  position: sticky;
  top: 0;
}

.page { display:none; padding-bottom: 90px; }
.active { display:block; }

.card {
  background: white;
  margin: 12px;
  padding: 16px;
  border-radius: 20px;
  box-shadow: 0 6px 16px rgba(0,0,0,0.05);
}

.big {
  font-size: 34px;
  font-weight: 800;
}

.small {
  font-size: 12px;
  color: #777;
}

.progress {
  height: 10px;
  background: #eee;
  border-radius: 20px;
}

.fill {
  height: 100%;
  width: 0%;
  background: #34c759;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 14px;
  border: none;
  font-weight: 600;
  color: white;
  background: #007aff;
}

.green { background:#34c759; }
.red { background:#ff3b30; }

/* SMALL RESET BUTTON */
.smallBtn {
  width: 40%;
  padding: 8px;
  font-size: 12px;
  border-radius: 10px;
  background: #ff3b30;
  margin-top: 10px;
}

/* ITEM LIST */
.item {
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #eee;
}

.delete {
  color:#ff3b30;
  font-size:12px;
}

/* TAB */
.tabbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display:flex;
  background:white;
  border-top:1px solid #ddd;
}

.tab {
  flex:1;
  text-align:center;
  line-height:60px;
  font-weight:600;
  color:#888;
}

.tab.active {
  color:#007aff;
}

</style>

</head>

<body>

<div class="header">🔥 FitTrack Pro</div>

<!-- HOME -->
<div id="home" class="page active">

  <div class="card">

    <div class="big" id="total">0 calories</div>

    <div class="small">
      Goal:
      <input id="goalInput" type="number" style="width:90px;display:inline-block;padding:4px;margin-left:6px;" onchange="updateGoal()">
    </div>

    <div class="progress" style="margin-top:10px;">
      <div class="fill" id="bar"></div>
    </div>

    <!-- SMALL RESET BUTTON -->
    <button class="smallBtn" onclick="resetDay()">Reset Day</button>

  </div>

  <div class="card">
    <div id="list"></div>
  </div>

</div>

<!-- SCAN -->
<div id="scanPage" class="page">

  <div class="card">
    <button onclick="startScan()">Scan Barcode</button>
    <div id="scanner"></div>
  </div>

  <div class="card">
    <input id="food" placeholder="Food">
    <input id="calories" type="number" placeholder="Calories">
    <button onclick="addFood()">Add Manual</button>
  </div>

</div>

<!-- MEALS -->
<div id="mealPage" class="page">

  <div class="card">
    <h3>Meal Plan</h3>

    <h4>Breakfast</h4>
    <label><input type="checkbox" onchange="meal('Eggs',140)"> Eggs</label><br><br>
    <label><input type="checkbox" onchange="meal('Oatmeal',150)"> Oatmeal</label>

    <h4>Lunch</h4>
    <label><input type="checkbox" onchange="meal('Chicken',200)"> Chicken</label><br><br>
    <label><input type="checkbox" onchange="meal('Rice',250)"> Rice</label>

    <h4>Dinner</h4>
    <label><input type="checkbox" onchange="meal('Salmon',300)"> Salmon</label><br><br>
    <label><input type="checkbox" onchange="meal('Veggies',80)"> Veggies</label>

  </div>

</div>

<!-- TAB -->
<div class="tabbar">
  <div class="tab active" onclick="nav('home')">Home</div>
  <div class="tab" onclick="nav('scanPage')">Scan</div>
  <div class="tab" onclick="nav('mealPage')">Meals</div>
</div>

<script>

const today = new Date().toISOString().split("T")[0];

let db = JSON.parse(localStorage.getItem("db") || "{}");
if (!db[today]) db[today] = [];

if (!db.goal) db.goal = 2000;

document.getElementById("goalInput").value = db.goal;

/* SAVE */
function save() {
  localStorage.setItem("db", JSON.stringify(db));
}

/* UPDATE GOAL */
function updateGoal() {
  db.goal = Number(document.getElementById("goalInput").value);
  save();
  render();
}

/* RENDER */
function render() {
  let total = 0;
  const list = document.getElementById("list");
  list.innerHTML = "";

  db[today].forEach((item, i) => {
    total += item.calories;

    list.innerHTML += `
      <div class="item">
        <span>${item.name}</span>
        <span>${item.calories} cal</span>
        <span class="delete" onclick="removeItem(${i})">delete</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total + " calories";

  const percent = Math.min((total / db.goal) * 100, 100);
  document.getElementById("bar").style.width = percent + "%";

  save();
}

/* ADD */
function addFood(name, cal) {
  const food = name || document.getElementById("food").value;
  const calories = cal || document.getElementById("calories").value;

  if (!food || !calories) return;

  db[today].push({ name: food, calories: Number(calories) });

  document.getElementById("food").value = "";
  document.getElementById("calories").value = "";

  render();
}

/* DELETE */
function removeItem(i) {
  db[today].splice(i, 1);
  render();
}

/* RESET DAY */
function resetDay() {
  db[today] = [];
  render();
}

/* MEAL */
function meal(name, cal) {
  addFood(name, cal);
}

/* NAV */
function nav(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(page).classList.add("active");

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");
}

render();

</script>

</body>
</html>
