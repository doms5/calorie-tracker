<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack</title>

<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="apple-touch-icon" href="icon.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>

/* ===== APP BACKGROUND (iOS STYLE) ===== */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  background: #f2f2f7;
}

/* HEADER (glass style) */
.header {
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
  padding: 16px;
  font-size: 20px;
  font-weight: 700;
  text-align: center;
  position: sticky;
  top: 0;
  border-bottom: 1px solid #eee;
}

/* PAGES */
.page { display: none; padding-bottom: 80px; }
.active { display: block; }

/* CARDS (APP STORE STYLE) */
.card {
  background: white;
  margin: 12px;
  padding: 16px;
  border-radius: 20px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.05);
}

/* TEXT */
.big {
  font-size: 36px;
  font-weight: 800;
}

.small {
  font-size: 12px;
  color: #888;
}

/* PROGRESS */
.progress {
  height: 10px;
  background: #e5e5ea;
  border-radius: 20px;
  overflow: hidden;
}

.fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg,#34c759,#30d158);
}

/* INPUTS */
input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 16px;
}

/* BUTTONS */
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 14px;
  border: none;
  font-weight: 600;
  color: white;
  background: #007aff;
}

.green { background: #34c759; }
.red { background: #ff3b30; }

/* LIST */
.item {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid #eee;
}

/* TAB BAR */
.tabbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  display: flex;
  border-top: 1px solid #ddd;
}

.tab {
  flex: 1;
  text-align: center;
  line-height: 60px;
  font-size: 14px;
  font-weight: 600;
  color: #8e8e93;
}

.tab.active {
  color: #007aff;
}

/* NOTIFICATION BANNER */
.banner {
  margin: 12px;
  padding: 12px;
  border-radius: 14px;
  background: #fff4d6;
  font-size: 13px;
  display: none;
}

</style>

</head>

<body>

<div class="header">🔥 FitTrack</div>

<div id="notifyBanner" class="banner">
  🔔 Reminder: Don’t forget to log your meals today
</div>

<!-- DASHBOARD -->
<div id="home" class="page active">

  <div class="card">
    <div class="big" id="total">0 calories</div>
    <div class="small">Daily Goal: 2000</div>

    <div class="progress">
      <div class="fill" id="bar"></div>
    </div>

    <button onclick="enableNotifications()">Enable Reminders 🔔</button>
  </div>

  <div class="card">
    <div class="small">Today’s Foods</div>
    <div id="list"></div>
  </div>

</div>

<!-- SCAN -->
<div id="scanPage" class="page">

  <div class="card">
    <button onclick="startScan()">Start Scanner</button>
    <div id="scanner"></div>
  </div>

  <div class="card">
    <input id="food" placeholder="Food name">
    <input id="calories" type="number" placeholder="Calories">
    <button onclick="addFood()">Add Food</button>
  </div>

</div>

<!-- MEAL PLAN -->
<div id="mealPage" class="page">

  <div class="card">
    <h3>Meal Plan</h3>

    <label><input type="checkbox" onchange="meal('Eggs',140)"> Eggs</label><br><br>
    <label><input type="checkbox" onchange="meal('Chicken',200)"> Chicken</label><br><br>
    <label><input type="checkbox" onchange="meal('Rice',250)"> Rice</label><br><br>
    <label><input type="checkbox" onchange="meal('Apple',95)"> Apple</label>
  </div>

</div>

<!-- TAB BAR -->
<div class="tabbar">
  <div class="tab active" onclick="nav('home')">Home</div>
  <div class="tab" onclick="nav('scanPage')">Scan</div>
  <div class="tab" onclick="nav('mealPage')">Meals</div>
</div>

<script>

let items = JSON.parse(localStorage.getItem("foods") || "[]");
const GOAL = 2000;

/* ===== RENDER ===== */
function render() {
  let total = 0;
  const list = document.getElementById("list");
  list.innerHTML = "";

  items.forEach(i => {
    total += i.calories;

    list.innerHTML += `
      <div class="item">
        <span>${i.name}</span>
        <span>${i.calories}</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total + " calories";
  document.getElementById("bar").style.width = Math.min((total/GOAL)*100,100) + "%";

  localStorage.setItem("foods", JSON.stringify(items));

  checkReminder(total);
}

/* ===== ADD FOOD ===== */
function addFood(name, cal) {
  const food = name || document.getElementById("food").value;
  const calories = cal || document.getElementById("calories").value;

  if (!food || !calories) return;

  items.push({ name: food, calories: Number(calories) });

  document.getElementById("food").value = "";
  document.getElementById("calories").value = "";

  render();
}

/* ===== SCANNER ===== */
function startScan() {
  const scanner = document.getElementById("scanner");
  scanner.innerHTML = "";

  Quagga.init({
    inputStream: { type: "LiveStream", target: scanner },
    decoder: { readers: ["ean_reader","upc_reader"] }
  }, err => {
    if (err) return alert(err);
    Quagga.start();
  });

  Quagga.onDetected(async data => {
    const code = data.codeResult.code;
    Quagga.stop();

    const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    const json = await res.json();

    const p = json.product || {};

    addFood(
      p.product_name || "Food",
      p?.nutriments?.["energy-kcal_100g"] || 0
    );
  });
}

/* ===== MEAL PLAN ===== */
function meal(name, cal) {
  addFood(name, cal);
}

/* ===== NAV ===== */
function nav(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(page).classList.add("active");

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");
}

/* ===== NOTIFICATIONS ===== */
function enableNotifications() {
  Notification.requestPermission().then(p => {
    if (p === "granted") {
      alert("Reminders enabled 🔔");
    }
  });
}

function checkReminder(total) {
  const banner = document.getElementById("notifyBanner");

  if (total < 500) {
    banner.style.display = "block";
  } else {
    banner.style.display = "none";
  }

  if (Notification.permission === "granted") {
    if (total === 0) {
      new Notification("FitTrack", {
        body: "Start logging your meals today 🔥"
      });
    }
  }
}

render();

</script>

</body>
</html>
