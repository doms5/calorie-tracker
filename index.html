<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack Elite</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== BACKGROUND ===== */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display";
  background: linear-gradient(180deg,#eef2ff,#f7f7fb);
  color: #111;
}

/* ===== APP CONTAINER ===== */
.app {
  max-width: 430px;
  margin: 0 auto;
}

/* ===== HEADER ===== */
.header {
  text-align:center;
  font-weight:700;
  padding:16px;
  font-size:18px;
}

/* ===== PAGE ===== */
.page { display:none; padding-bottom:100px; }
.active { display:block; }

/* ===== GLASS CARD ===== */
.card {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(18px);
  margin: 14px;
  padding: 18px;
  border-radius: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* ===== CALORIES RING ===== */
.ring {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  margin: 10px auto;
  background: conic-gradient(#34c759 0%, #eee 0%);
  display:flex;
  align-items:center;
  justify-content:center;
}

.ring-inner {
  width: 110px;
  height: 110px;
  background: white;
  border-radius: 50%;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

/* ===== TEXT ===== */
.big { font-size: 28px; font-weight: 800; }
.small { font-size: 12px; color: #777; }

/* ===== INPUT ===== */
input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 14px;
  border: 1px solid #ddd;
  font-size: 14px;
}

/* ===== BUTTON ===== */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 14px;
  border: none;
  background: #007aff;
  color: white;
  font-weight: 600;
}

button:active { transform: scale(0.98); }

.red { background:#ff3b30; }
.green { background:#34c759; }

/* ===== LIST ===== */
.item {
  display:flex;
  justify-content:space-between;
  padding:12px 0;
  border-bottom:1px solid rgba(0,0,0,0.06);
}

.delete {
  color:#ff3b30;
  font-size:12px;
}

/* ===== MACRO CARDS ===== */
.macros {
  display:flex;
  gap:10px;
}

.macro {
  flex:1;
  background:white;
  padding:10px;
  border-radius:14px;
  text-align:center;
  box-shadow:0 6px 16px rgba(0,0,0,0.05);
}

.macro b {
  display:block;
  font-size:16px;
}

/* ===== TAB BAR ===== */
.tabbar {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:rgba(255,255,255,0.9);
  backdrop-filter: blur(20px);
  border-top:1px solid #ddd;
}

.tab {
  flex:1;
  text-align:center;
  padding:10px 0;
  font-size:11px;
  color:#8e8e93;
  font-weight:600;
}

.tab.active {
  color:#007aff;
}

/* ===== CHART ===== */
canvas { width:100%; }

</style>

</head>

<body>

<div class="app">

<div class="header">🔥 FitTrack Elite</div>

<!-- HOME -->
<div id="home" class="page active">

  <div class="card">

    <div class="ring" id="ring">
      <div class="ring-inner">
        <div class="big" id="cal">0</div>
        <div class="small">calories</div>
      </div>
    </div>

    <div class="small" style="text-align:center;">
      📅 <span id="date"></span> • 🔥 Streak <span id="streak">0</span>
    </div>

  </div>

  <div class="card">
    <div class="macros">
      <div class="macro"><b id="p">0</b>Protein</div>
      <div class="macro"><b id="c">0</b>Carbs</div>
      <div class="macro"><b id="f">0</b>Fat</div>
    </div>
  </div>

  <div class="card">
    <div id="list"></div>
  </div>

</div>

<!-- SCAN -->
<div id="scan" class="page">

  <div class="card">
    <button onclick="scan()">Scan Barcode</button>
    <div id="scanner"></div>
  </div>

  <div class="card">
    <input id="food" placeholder="Food">
    <input id="cal" type="number" placeholder="Calories">
    <input id="pro" type="number" placeholder="Protein">
    <input id="car" type="number" placeholder="Carbs">
    <input id="fat" type="number" placeholder="Fat">
    <button onclick="add()">Add Food</button>
  </div>

</div>

<!-- STATS -->
<div id="stats" class="page">

  <div class="card">
    <canvas id="chart"></canvas>
  </div>

</div>

<!-- TAB -->
<div class="tabbar">

  <div class="tab active" onclick="nav('home')">🏠<br>Home</div>
  <div class="tab" onclick="nav('scan')">📷<br>Scan</div>
  <div class="tab" onclick="nav('stats')">📊<br>Stats</div>

</div>

</div>

<script>

const today = new Date().toISOString().split("T")[0];

let db = JSON.parse(localStorage.getItem("db") || "{}");
if (!db[today]) db[today] = [];

document.getElementById("date").innerText = today;

/* SAVE */
function save(){
  localStorage.setItem("db", JSON.stringify(db));
}

/* ADD */
function add(){

  db[today].push({
    name: food.value,
    calories: +cal.value,
    protein: +pro.value||0,
    carbs: +car||0,
    fat: +fat||0
  });

  save();
  render();
}

/* DELETE */
function del(i){
  db[today].splice(i,1);
  save();
  render();
}

/* RENDER */
function render(){

  let total=0,p=0,c=0,f=0;
  let list=document.getElementById("list");
  list.innerHTML="";

  db[today].forEach((i,index)=>{

    total+=i.calories;
    p+=i.protein;
    c+=i.carbs;
    f+=i.fat;

    list.innerHTML+=`
      <div class="item">
        <span>${i.name}</span>
        <span>${i.calories}</span>
        <span class="delete" onclick="del(${index})">x</span>
      </div>
    `;
  });

  cal.innerText=total;
  p.innerText=p;
  c.innerText=c;
  f.innerText=f;

  updateRing(total);
  save();
}

/* RING */
function updateRing(val){
  let percent=Math.min(val/2000*100,100);
  document.getElementById("ring").style.background=
    `conic-gradient(#34c759 ${percent}%, #eee ${percent}%)`;
}

/* NAV */
function nav(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById(p).classList.add("active");
}

/* SCAN (basic) */
function scan(){

  const scanner=document.getElementById("scanner");

  Quagga.init({
    inputStream:{type:"LiveStream",target:scanner},
    decoder:{readers:["ean_reader","upc_reader"]}
  },err=>{ if(err) return alert(err); Quagga.start(); });

  Quagga.onDetected(async d=>{
    let code=d.codeResult.code;
    Quagga.stop();

    let r=await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    let j=await r.json();
    let p=j.product||{};

    db[today].push({
      name:p.product_name||"Food",
      calories:p?.nutriments?.["energy-kcal_100g"]||0,
      protein:0,carbs:0,fat:0
    });

    save(); render();
  });
}

render();

</script>

</body>
</html>
