<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack Master v5</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>

/* =========================
   PREMIUM BACKGROUND SYSTEM
========================= */

body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
  background: radial-gradient(circle at top, #1d4ed8, #0f172a 40%, #020617 100%);
  color:white;
}

/* APP WRAPPER */
.app {
  max-width: 430px;
  margin: 0 auto;
  padding-bottom: 90px;
}

/* HEADER */
.header {
  text-align:center;
  padding:16px;
  font-weight:800;
  font-size:18px;
  letter-spacing:0.5px;
  color:white;
}

/* PAGE SYSTEM */
.page { display:none; }
.active { display:block; }

/* =========================
   GLASS CARDS (CORE UI)
========================= */

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.12);
  margin:12px;
  padding:16px;
  border-radius:22px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* =========================
   HERO CALORIES DISPLAY
========================= */

.hero {
  text-align:center;
  padding:20px 0;
}

.big {
  font-size:44px;
  font-weight:900;
  letter-spacing:-1px;
}

.small {
  font-size:12px;
  opacity:0.7;
}

/* =========================
   INPUT STYLE (PILL DESIGN)
========================= */

input {
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:14px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.1);
  color:white;
}

input::placeholder {
  color:rgba(255,255,255,0.6);
}

/* =========================
   BUTTONS
========================= */

button {
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:14px;
  border:none;
  background: linear-gradient(135deg,#3b82f6,#06b6d4);
  color:white;
  font-weight:700;
}

button:active {
  transform: scale(0.98);
}

.red {
  background: linear-gradient(135deg,#ef4444,#dc2626);
}

/* =========================
   LIST ITEMS
========================= */

.item {
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.delete {
  color:#ff6b6b;
  font-size:12px;
}

/* =========================
   MACROS GRID
========================= */

.macroGrid {
  display:flex;
  gap:10px;
}

.macro {
  flex:1;
  padding:12px;
  border-radius:16px;
  background:rgba(255,255,255,0.08);
  text-align:center;
}

.macro b {
  display:block;
  font-size:18px;
}

/* =========================
   TAB BAR
========================= */

.tabbar {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(20px);
  border-top:1px solid rgba(255,255,255,0.1);
}

.tab {
  flex:1;
  text-align:center;
  padding:10px 0;
  font-size:11px;
  color:rgba(255,255,255,0.6);
  font-weight:600;
}

.tab.active {
  color:#38bdf8;
}

/* SCANNER AREA */
#scanner {
  border-radius:16px;
  overflow:hidden;
}

</style>

</head>

<body>

<div class="app">

<div class="header">🔥 FitTrack Master</div>

<!-- HOME -->
<div id="home" class="page active">

  <div class="card hero">

    <div class="big" id="total">0</div>
    <div class="small">Calories Today</div>

    <div class="small" style="margin-top:6px;">
      📅 <span id="date"></span>
    </div>

    <button class="red" onclick="resetDay()">Reset Day</button>

  </div>

  <div class="card">
    <div class="small">Macros</div>

    <div class="macroGrid">
      <div class="macro"><b id="p">0</b>Protein</div>
      <div class="macro"><b id="c">0</b>Carbs</div>
      <div class="macro"><b id="f">0</b>Fat</div>
    </div>
  </div>

  <div class="card">
    <div id="list"></div>
  </div>

</div>

<!-- SCAN -->
<div id="scan" class="page">

  <div class="card">
    <button onclick="scan()">Scan Barcode</button>
    <div id="scanner"></div>
  </div>

  <div class="card">

    <input id="food" placeholder="Food name">
    <input id="cal" type="number" placeholder="Calories">
    <input id="pro" type="number" placeholder="Protein">
    <input id="car" type="number" placeholder="Carbs">
    <input id="fat" type="number" placeholder="Fat">

    <button onclick="addFood()">Add Food</button>

  </div>

</div>

<!-- MEALS -->
<div id="meals" class="page">

  <div class="card">
    <div class="small">Meal Plan</div>

    <label><input type="checkbox" onchange="meal('Eggs',140)"> Eggs</label><br>
    <label><input type="checkbox" onchange="meal('Chicken',200)"> Chicken</label><br>
    <label><input type="checkbox" onchange="meal('Rice',220)"> Rice</label><br>
    <label><input type="checkbox" onchange="meal('Protein Bar',180)"> Protein Bar</label>

  </div>

</div>

</div>

<!-- TAB BAR -->
<div class="tabbar">

  <div class="tab active" onclick="nav('home')">Home</div>
  <div class="tab" onclick="nav('scan')">Scan</div>
  <div class="tab" onclick="nav('meals')">Meals</div>

</div>

<script>

const today = new Date().toISOString().split("T")[0];

let db = JSON.parse(localStorage.getItem("db") || "{}");
if (!db[today]) db[today] = [];

document.getElementById("date").innerText = today;

/* SAVE */
function save(){
  localStorage.setItem("db", JSON.stringify(db));
}

/* ADD FOOD */
function addFood(){

  db[today].push({
    name:food.value,
    calories:+cal.value,
    protein:+pro.value||0,
    carbs:+car.value||0,
    fat:+fat.value||0
  });

  save();
  render();
}

/* DELETE */
function del(i){
  db[today].splice(i,1);
  save();
  render();
}

/* RESET */
function resetDay(){
  db[today]=[];
  save();
  render();
}

/* MEAL */
function meal(n,c){
  db[today].push({name:n,calories:c,protein:0,carbs:0,fat:0});
  save();
  render();
}

/* RENDER */
function render(){

  let total=0,p=0,c=0,f=0;
  list.innerHTML="";

  db[today].forEach((i,idx)=>{

    total+=i.calories;
    p+=i.protein;
    c+=i.carbs;
    f+=i.fat;

    list.innerHTML+=`
      <div class="item">
        <span>${i.name}</span>
        <span>${i.calories}</span>
        <span class="delete" onclick="del(${idx})">x</span>
      </div>
    `;
  });

  totalDisplay.innerText = total;

  p.innerText=p;
  c.innerText=c;
  f.innerText=f;
}

/* SCAN */
function scan(){

  const scanner=document.getElementById("scanner");

  Quagga.init({
    inputStream:{type:"LiveStream",target:scanner},
    decoder:{readers:["ean_reader","upc_reader"]}
  },err=>{ if(err) return alert(err); Quagga.start(); });

  Quagga.onDetected(async d=>{

    let code=d.codeResult.code;
    Quagga.stop();

    let r=await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    let j=await r.json();
    let p=j.product||{};

    db[today].push({
      name:p.product_name||"Food",
      calories:p?.nutriments?.["energy-kcal_100g"]||0,
      protein:0,carbs:0,fat:0
    });

    save();
    render();
  });
}

/* NAV */
function nav(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById(p).classList.add("active");
}

render();

</script>

</body>
</html>
