<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FitTrack v15</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a84ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text";
  background:#0b0f19;
  color:white;
}

/* APP */
.app{max-width:430px;margin:0 auto;padding-bottom:90px;}

/* HEADER */
.header{
  text-align:center;
  padding:12px;
  font-weight:600;
  background:rgba(20,20,25,0.7);
  backdrop-filter:blur(20px);
  position:sticky;
  top:0;
}

/* PAGES */
.page{display:none;}
.active{display:block;animation:fade .2s ease;}

@keyframes fade{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}

/* CARDS */
.card{
  margin:12px;
  padding:16px;
  border-radius:18px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
}

/* CAL RING */
.ringWrap{
  display:flex;
  justify-content:center;
  margin-top:10px;
}

.ring{
  width:140px;
  height:140px;
  border-radius:50%;
  background:conic-gradient(#0a84ff var(--p,0%), rgba(255,255,255,0.08) 0%);
  display:flex;
  align-items:center;
  justify-content:center;
}

.ringInner{
  width:110px;
  height:110px;
  border-radius:50%;
  background:#0b0f19;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* FOOD ITEM */
.food{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
}

/* QUICK ADD */
.quick{
  display:flex;
  gap:8px;
  overflow-x:auto;
}

.pill{
  padding:8px 12px;
  border-radius:999px;
  background:rgba(255,255,255,0.06);
  font-size:12px;
  white-space:nowrap;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#0a84ff;
  color:white;
  font-weight:600;
}

.red{background:#ff453a;}

/* TAB BAR */
.tabbar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:rgba(20,20,25,0.9);
  backdrop-filter:blur(25px);
}

.tab{
  flex:1;
  text-align:center;
  padding:10px;
  font-size:11px;
  color:#8e8e93;
}

.tab.active{color:#0a84ff;}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.06);
  color:white;
}

/* SCANNER */
.scanBox{
  height:260px;
  background:black;
  border-radius:16px;
  overflow:hidden;
  position:relative;
}

.scanLine{
  position:absolute;
  height:2px;
  left:0;
  right:0;
  background:#0a84ff;
  animation:scan 1.4s infinite;
}

@keyframes scan{
  0%{transform:translateY(0);}
  50%{transform:translateY(260px);}
  100%{transform:translateY(0);}
}

</style>

</head>

<body>

<div class="app">

<div class="header">FitTrack v15</div>

<!-- HOME -->
<div id="home" class="page active">

  <div class="card">

    <div class="ringWrap">
      <div class="ring" id="ring">
        <div class="ringInner">
          <div id="cal">0</div>
          <div style="font-size:11px;opacity:.6">calories</div>
        </div>
      </div>
    </div>

    <div style="text-align:center;margin-top:10px;font-size:12px;opacity:.6">
      Goal: 2000
    </div>

    <button class="red" onclick="resetDay()">Reset Day</button>
  </div>

  <div class="card">

    <div style="font-weight:600">Quick Add</div>

    <div class="quick">
      <div class="pill" onclick="quickAdd('Eggs',140)">Eggs</div>
      <div class="pill" onclick="quickAdd('Chicken',400)">Chicken</div>
      <div class="pill" onclick="quickAdd('Rice',200)">Rice</div>
    </div>

  </div>

  <div class="card">
    <div id="list"></div>
  </div>

</div>

<!-- SCAN -->
<div id="scan" class="page">

  <div class="card">

    <div class="scanBox">
      <div id="scanner"></div>
      <div class="scanLine"></div>
    </div>

    <button onclick="startScan()">Scan Barcode</button>
    <button onclick="showManual()">Manual Add</button>

  </div>

</div>

<!-- MEALS -->
<div id="meals" class="page">

  <div class="card">
    <div style="font-weight:600">Meal History</div>
    <div id="history"></div>
  </div>

</div>

</div>

<!-- MANUAL -->
<div id="modal" style="
position:fixed;
bottom:-400px;
left:0;right:0;
background:#1c1c1e;
padding:16px;
border-radius:20px 20px 0 0;
transition:.3s;
">

<input id="name" placeholder="Food name">
<input id="calories" type="number" placeholder="Calories">

<button onclick="addManual()">Add</button>
<button class="red" onclick="closeModal()">Cancel</button>

</div>

<!-- TAB -->
<div class="tabbar">
  <div class="tab active" onclick="nav('home')">Home</div>
  <div class="tab" onclick="nav('scan')">Scan</div>
  <div class="tab" onclick="nav('meals')">History</div>
</div>

<script>

const today=new Date().toISOString().split("T")[0];

let db=JSON.parse(localStorage.getItem("db")||"{}");
if(!db[today]) db[today]=[];

function save(){localStorage.setItem("db",JSON.stringify(db));}

/* RENDER */
function render(){

  let total=db[today].reduce((a,b)=>a+Number(b.calories),0);

  document.getElementById("cal").innerText=total;

  let percent=Math.min(total/2000*100,100);
  document.getElementById("ring").style.setProperty("--p",percent+"%");

  let list=document.getElementById("list");
  list.innerHTML="";

  db[today].forEach(i=>{
    list.innerHTML+=`
      <div class="food">
        <span>${i.name}</span>
        <span>${i.calories}</span>
      </div>`;
  });
}

/* QUICK */
function quickAdd(n,c){
  db[today].push({name:n,calories:c});
  save();
  render();
}

/* RESET */
function resetDay(){
  db[today]=[];
  save();
  render();
}

/* MANUAL */
function showManual(){document.getElementById("modal").style.bottom="0";}
function closeModal(){document.getElementById("modal").style.bottom="-400px";}

function addManual(){
  db[today].push({
    name:document.getElementById("name").value,
    calories:Number(document.getElementById("calories").value)
  });

  save();
  render();
  closeModal();
}

/* SCAN */
function startScan(){
  const scanner=document.getElementById("scanner");

  Quagga.init({
    inputStream:{type:"LiveStream",target:scanner},
    decoder:{readers:["ean_reader","upc_reader"]}
  },err=>{
    if(err) return alert(err);
    Quagga.start();
  });

  Quagga.onDetected(async d=>{
    Quagga.stop();

    const code=d.codeResult.code;

    const res=await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    const json=await res.json();
    const p=json.product||{};

    let kcal=0;
    const n=p.nutriments||{};
    if(n["energy-kcal_100g"]) kcal=n["energy-kcal_100g"];
    else if(n["energy_100g"]) kcal=n["energy_100g"]/4.184;

    db[today].push({
      name:p.product_name||"Food",
      calories:Math.round(kcal||0)
    });

    save();
    render();
  });
}

/* NAV */
function nav(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById(p).classList.add("active");

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
}

/* INIT */
render();

</script>

</body>
</html>
