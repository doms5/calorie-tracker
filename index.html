<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FitTrack Elite v9</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text";
  background:#0b0f19;
  color:#f5f5f7;
}

/* APP CONTAINER */
.app{
  max-width:430px;
  margin:0 auto;
  padding-bottom:90px;
}

/* HEADER (Apple clean blur style) */
.header{
  position:sticky;
  top:0;
  background:rgba(20,20,25,0.7);
  backdrop-filter:blur(20px);
  padding:14px;
  text-align:center;
  font-weight:600;
  font-size:17px;
  border-bottom:1px solid rgba(255,255,255,0.06);
}

/* PAGES */
.page{display:none;}
.active{display:block;}

/* CARDS (Apple grouped style) */
.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  margin:12px;
  padding:16px;
  border-radius:16px;
}

/* BIG NUMBER */
.big{
  font-size:44px;
  font-weight:700;
  letter-spacing:-1px;
}

/* LABELS */
.small{
  font-size:13px;
  opacity:0.6;
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.06);
  color:white;
  outline:none;
}

/* BUTTONS */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  background:#0a84ff;
  color:white;
  font-weight:600;
  font-size:15px;
}

button:active{
  transform:scale(0.98);
  opacity:0.8;
}

.red{
  background:#ff453a;
}

/* LIST ITEMS */
.item{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
}

/* MEAL ITEMS */
.mealItem{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
  transition:0.2s ease;
}

.mealItem:active{
  transform:scale(0.98);
}

/* CHECKBOX */
input[type="checkbox"]{
  width:18px;
  height:18px;
  accent-color:#0a84ff;
}

/* TAB BAR (iOS style) */
.tabbar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:rgba(18,18,22,0.9);
  backdrop-filter:blur(25px);
  border-top:1px solid rgba(255,255,255,0.06);
}

.tab{
  flex:1;
  text-align:center;
  padding:10px;
  font-size:11px;
  color:#8e8e93;
}

.tab.active{
  color:#0a84ff;
}

/* ANIMATION */
.fade{
  animation:fadeIn 0.25s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(6px);}
  to{opacity:1;transform:translateY(0);}
}

</style>

</head>

<body>

<div class="app">

<div class="header">FitTrack</div>

<!-- HOME -->
<div id="home" class="page active fade">

  <div class="card">
    <div class="big" id="total">0</div>
    <div class="small">Calories Today</div>

    <div class="small" style="margin-top:6px">
      📅 <span id="date"></span>
    </div>

    <button class="red" onclick="resetDay()">Reset Day</button>
  </div>

  <div class="card">
    <div id="list"></div>
  </div>

</div>

<!-- SCAN -->
<div id="scan" class="page fade">

  <div class="card">
    <button onclick="startScan()">Scan Barcode</button>
    <div id="scanner"></div>
  </div>

</div>

<!-- MEALS -->
<div id="meals" class="page fade">

  <div class="card">
    <div style="font-size:18px;font-weight:600">Meal Plan</div>
    <div class="small">Tap checkbox to complete</div>

    <div class="small" style="margin-top:6px">
      📅 <span id="mealDate"></span>
    </div>
  </div>

  <div class="card">
    <div style="font-weight:600">Breakfast</div>
    <div id="breakfast"></div>
  </div>

  <div class="card">
    <div style="font-weight:600">Lunch</div>
    <div id="lunch"></div>
  </div>

  <div class="card">
    <div style="font-weight:600">Dinner</div>
    <div id="dinner"></div>
  </div>

  <div class="card">
    <div style="font-weight:600">Snack</div>
    <div id="snack"></div>
  </div>

</div>

</div>

<!-- TAB BAR -->
<div class="tabbar">
  <div class="tab active" onclick="nav('home')">Home</div>
  <div class="tab" onclick="nav('scan')">Scan</div>
  <div class="tab" onclick="nav('meals')">Meals</div>
</div>

<script>

const today = new Date().toISOString().split("T")[0];

document.getElementById("date").innerText =
  new Date().toLocaleDateString();

document.getElementById("mealDate").innerText =
  new Date().toLocaleDateString();

/* DATA */
let db = JSON.parse(localStorage.getItem("db") || "{}");
if(!db[today]) db[today]=[];

let meals = JSON.parse(localStorage.getItem("meals") || "null");

if(!meals){
  meals={
    breakfast:[
      {name:"Eggs",calories:140,done:false},
      {name:"Oatmeal",calories:300,done:false}
    ],
    lunch:[{name:"Chicken Rice",calories:450,done:false}],
    dinner:[{name:"Salmon",calories:400,done:false}],
    snack:[{name:"Protein Bar",calories:180,done:false}]
  };
}

function save(){
  localStorage.setItem("db",JSON.stringify(db));
}

function saveMeals(){
  localStorage.setItem("meals",JSON.stringify(meals));
}

/* HOME */
function render(){

  let total=0;
  const el=document.getElementById("list");

  el.innerHTML="";

  db[today].forEach(i=>{
    total+=Number(i.calories||0);

    el.innerHTML+=`
      <div class="item">
        <span>${i.name}</span>
        <span>${i.calories}</span>
      </div>
    `;
  });

  document.getElementById("total").innerText=total;
}

/* RESET */
function resetDay(){
  db[today]=[];
  save();
  render();
}

/* MEALS */
function toggle(m,i){
  meals[m][i].done=!meals[m][i].done;
  saveMeals();
  renderMeals();
}

function edit(m,i){
  let it=meals[m][i];

  let n=prompt("Name",it.name);
  let c=prompt("Calories",it.calories);

  if(n!==null) it.name=n;
  if(c!==null) it.calories=Number(c);

  saveMeals();
  renderMeals();
}

function add(m){
  let n=prompt("Food");
  let c=prompt("Calories");

  if(!n||!c) return;

  meals[m].push({name:n,calories:Number(c),done:false});
  saveMeals();
  renderMeals();
}

/* APPLE STYLE RENDER */
function renderMeals(){

  function fill(id,m){

    const el=document.getElementById(id);
    el.innerHTML="";

    meals[m].forEach((i,idx)=>{

      el.innerHTML+=`
        <div class="mealItem fade"
             style="opacity:${i.done?0.4:1};
                    text-decoration:${i.done?'line-through':'none'}">

          <input type="checkbox"
                 ${i.done?'checked':''}
                 onchange="toggle('${m}',${idx})">

          <span style="flex:1">${i.name}</span>

          <span>${i.calories}</span>

          <span style="color:#0a84ff;font-size:12px"
                onclick="edit('${m}',${idx})">edit</span>

        </div>
      `;
    });

    el.innerHTML+=`<button onclick="add('${m}')">+ Add</button>`;
  }

  fill("breakfast","breakfast");
  fill("lunch","lunch");
  fill("dinner","dinner");
  fill("snack","snack");
}

/* SCAN */
let scanning=false;

function startScan(){

  if(scanning) return;
  scanning=true;

  const scanner=document.getElementById("scanner");

  Quagga.init({
    inputStream:{type:"LiveStream",target:scanner},
    decoder:{readers:["ean_reader","upc_reader"]}
  },err=>{
    if(err){scanning=false;return;}
    Quagga.start();
  });

  Quagga.onDetected(async d=>{

    if(!scanning) return;
    scanning=false;

    Quagga.stop();

    const code=d.codeResult.code;

    const res=await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    const json=await res.json();

    const p=json.product||{};

    db[today].push({
      name:p.product_name||"Food",
      calories:Number(p?.nutriments?.["energy-kcal_100g"]||0)
    });

    save();
    render();
  });
}

/* NAV */
function nav(p){

  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById(p).classList.add("active");

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
}

/* INIT */
render();
renderMeals();

</script>

</body>
</html>
