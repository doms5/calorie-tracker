<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FitTrack Elite v13 FIXED</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a84ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text";
  background:#0b0f19;
  color:#f5f5f7;
}

.app{max-width:430px;margin:0 auto;padding-bottom:90px;}

.header{
  position:sticky;
  top:0;
  background:rgba(20,20,25,0.7);
  backdrop-filter:blur(20px);
  padding:14px;
  text-align:center;
  font-weight:600;
  font-size:17px;
}

.page{display:none;}
.active{display:block;}

.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  margin:12px;
  padding:16px;
  border-radius:16px;
}

.big{font-size:44px;font-weight:700;}

.small{font-size:13px;opacity:0.6;}

input{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.06);
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  background:#0a84ff;
  color:white;
  font-weight:600;
}

.red{background:#ff453a;}

.item{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
}

.mealItem{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
}

input[type="checkbox"]{
  width:18px;
  height:18px;
  accent-color:#0a84ff;
}

/* SCAN */
.scanLine{
  position:absolute;
  left:0;
  right:0;
  height:2px;
  background:linear-gradient(90deg,transparent,#0a84ff,transparent);
  animation:scanMove 1.6s linear infinite;
}

@keyframes scanMove{
  0%{transform:translateY(0);}
  50%{transform:translateY(260px);}
  100%{transform:translateY(0);}
}

#confirmModal{
  position:fixed;
  bottom:-400px;
  left:0;
  right:0;
  background:rgba(28,28,30,0.95);
  border-top-left-radius:20px;
  border-top-right-radius:20px;
  padding:16px;
  transition:0.35s ease;
  backdrop-filter:blur(20px);
}

/* TAB */
.tabbar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:rgba(18,18,22,0.9);
  backdrop-filter:blur(25px);
}

.tab{
  flex:1;
  text-align:center;
  padding:10px;
  font-size:11px;
  color:#8e8e93;
}

.tab.active{color:#0a84ff;}

</style>

</head>

<body>

<div class="app">

<div class="header">FitTrack Elite v13 FIXED</div>

<!-- HOME -->
<div id="home" class="page active">

  <div class="card">
    <div class="big" id="total">0</div>
    <div class="small">Calories Today</div>
    <div class="small">📅 <span id="date"></span></div>

    <button class="red" onclick="resetDay()">Reset Day</button>
  </div>

  <div class="card">
    <div id="list"></div>
  </div>

</div>

<!-- SCAN -->
<div id="scan" class="page">

  <div class="card">
    <div style="font-weight:700">Scan Food</div>

    <div style="position:relative;height:260px;margin-top:10px;background:black;border-radius:16px;overflow:hidden">
      <div id="scanner" style="width:100%;height:100%"></div>
      <div class="scanLine"></div>
    </div>

    <button onclick="startScan()">Start Scan</button>
  </div>

</div>

<!-- MEALS -->
<div id="meals" class="page">

  <div class="card">
    <div style="font-weight:700">Meal Plan</div>
    <div class="small">📅 <span id="mealDate"></span></div>
  </div>

  <div class="card">
    <div>Breakfast</div>
    <div id="breakfast"></div>
  </div>

  <div class="card">
    <div>Lunch</div>
    <div id="lunch"></div>
  </div>

  <div class="card">
    <div>Dinner</div>
    <div id="dinner"></div>
  </div>

  <div class="card">
    <div>Snack</div>
    <div id="snack"></div>
  </div>

</div>

</div>

<!-- MODAL -->
<div id="confirmModal">

  <div style="font-weight:700">Confirm Food</div>

  <div id="scanName" style="margin-top:10px"></div>

  <input id="scanCalories" type="number">

  <button onclick="confirmAdd()">Add</button>
  <button class="red" onclick="closeModal()">Cancel</button>

</div>

<!-- TAB -->
<div class="tabbar">
  <div class="tab active" onclick="nav('home')">Home</div>
  <div class="tab" onclick="nav('scan')">Scan</div>
  <div class="tab" onclick="nav('meals')">Meals</div>
</div>

<script>

/* DATE */
const today = new Date().toISOString().split("T")[0];
document.getElementById("date").innerText = new Date().toLocaleDateString();
document.getElementById("mealDate").innerText = new Date().toLocaleDateString();

/* DATA */
let db = JSON.parse(localStorage.getItem("db") || "{}");
if(!db[today]) db[today]=[];

let meals = JSON.parse(localStorage.getItem("meals") || "null");
if(!meals){
  meals={
    breakfast:[{name:"Eggs",calories:140,done:false}],
    lunch:[{name:"Chicken",calories:400,done:false}],
    dinner:[{name:"Salmon",calories:450,done:false}],
    snack:[{name:"Protein Bar",calories:180,done:false}]
  };
}

let foodCache = JSON.parse(localStorage.getItem("foodCache") || "{}");
let scanBuffer = null;
let lastScannedCode = null;

/* SAVE */
function save(){localStorage.setItem("db",JSON.stringify(db));}
function saveMeals(){localStorage.setItem("meals",JSON.stringify(meals));}
function saveCache(){localStorage.setItem("foodCache",JSON.stringify(foodCache));}

/* HOME (FIXED TOTAL) */
function render(){

  let total = db[today]
    .map(i=>Number(i.calories||0))
    .reduce((a,b)=>a+b,0);

  document.getElementById("total").innerText = total;

  const el=document.getElementById("list");
  el.innerHTML="";

  db[today].forEach(i=>{
    el.innerHTML+=`
      <div class="item">
        <span>${i.name}</span>
        <span>${i.calories}</span>
      </div>`;
  });
}

/* RESET */
function resetDay(){
  db[today]=[];
  save();
  render();
}

/* FIXED TOGGLE (THIS IS THE KEY BUG FIX) */
function toggle(m,i){

  const item = meals[m][i];
  item.done = !item.done;

  const cal = Number(item.calories || 0);

  if(item.done){
    db[today].push({
      name:item.name,
      calories:cal
    });
  } else {
    const index = db[today].findIndex(x =>
      x.name === item.name && Number(x.calories) === cal
    );

    if(index !== -1) db[today].splice(index,1);
  }

  save();
  saveMeals();
  render();
  renderMeals();
}

/* MEALS */
function renderMeals(){

  function fill(id,m){
    const el=document.getElementById(id);
    el.innerHTML="";

    meals[m].forEach((i,idx)=>{
      el.innerHTML+=`
        <div class="mealItem">
          <input type="checkbox"
                 ${i.done?'checked':''}
                 onchange="toggle('${m}',${idx})">

          <span style="flex:1">${i.name}</span>
          <span>${i.calories}</span>
        </div>`;
    });
  }

  fill("breakfast","breakfast");
  fill("lunch","lunch");
  fill("dinner","dinner");
  fill("snack","snack");
}

/* SCANNER */
function startScan(){

  const scanner=document.getElementById("scanner");

  Quagga.init({
    inputStream:{type:"LiveStream",target:scanner},
    decoder:{readers:["ean_reader","upc_reader"]}
  },err=>{
    if(err) return alert(err);
    Quagga.start();
  });

  Quagga.onDetected(async d=>{

    Quagga.stop();

    const code=d.codeResult.code;
    lastScannedCode = code;

    if(foodCache[code]){
      openModal(foodCache[code]);
      return;
    }

    const res=await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    const json=await res.json();
    const p=json.product||{};

    let kcal=0;
    const n=p.nutriments||{};

    if(n["energy-kcal_100g"]) kcal=n["energy-kcal_100g"];
    else if(n["energy_100g"]) kcal=n["energy_100g"]/4.184;

    kcal=Math.round(kcal||0);

    const food={name:p.product_name||"Food",calories:kcal};

    foodCache[code]=food;
    saveCache();

    openModal(food);
  });
}

/* MODAL */
function openModal(data){
  document.getElementById("scanName").innerText=data.name;
  document.getElementById("scanCalories").value=data.calories;
  document.getElementById("confirmModal").style.bottom="0";
}

function closeModal(){
  document.getElementById("confirmModal").style.bottom="-400px";
}

function confirmAdd(){

  db[today].push({
    name:document.getElementById("scanName").innerText,
    calories:Number(document.getElementById("scanCalories").value||0)
  });

  save();
  render();
  closeModal();
}

/* NAV */
function nav(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById(p).classList.add("active");
}

/* INIT */
render();
renderMeals();

</script>

</body>
</html>
