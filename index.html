<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack Pro</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text";
  background: #f2f2f7;
}

.header {
  padding: 14px;
  text-align: center;
  font-weight: 700;
  background: white;
  border-bottom: 1px solid #eee;
}

/* PAGES */
.page { display:none; padding-bottom: 90px; }
.active { display:block; }

/* CARD */
.card {
  background: white;
  margin: 12px;
  padding: 16px;
  border-radius: 18px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.05);
}

.big {
  font-size: 34px;
  font-weight: 800;
}

.small {
  font-size: 12px;
  color: #777;
}

/* INPUT */
input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  background: #007aff;
  color: white;
  font-weight: 600;
}

.red { background:#ff3b30; }

/* PROGRESS */
.progress {
  height: 10px;
  background: #e5e5ea;
  border-radius: 20px;
  overflow: hidden;
}

.fill {
  height: 100%;
  width: 0%;
  background: #34c759;
}

/* LIST */
.item {
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #eee;
}

.delete {
  color:#ff3b30;
  font-size:12px;
  cursor:pointer;
}

/* TAB BAR */
.tabbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display:flex;
  background:white;
  border-top:1px solid #ddd;
}

.tab {
  flex:1;
  text-align:center;
  padding:10px 0;
  font-size:12px;
  color:#888;
  font-weight:600;
}

.tab.active {
  color:#007aff;
}

</style>

</head>

<body>

<div class="header">🔥 FitTrack Pro</div>

<!-- HOME -->
<div id="home" class="page active">

  <div class="card">
    <div class="big" id="total">0 calories</div>

    <div class="small">
      📅 Today: <span id="dateLabel"></span>
    </div>

    <div class="small" style="margin-top:6px;">
      🎯 Goal:
      <input id="goalInput" type="number" onchange="updateGoal()" style="width:90px;display:inline-block;">
    </div>

    <div class="progress" style="margin-top:10px;">
      <div class="fill" id="bar"></div>
    </div>

    <button class="red" onclick="resetDay()" style="margin-top:10px;">
      Reset Day
    </button>
  </div>

  <div class="card">
    <div id="list"></div>
  </div>

</div>

<!-- SCAN -->
<div id="scan" class="page">

  <div class="card">
    <button onclick="startScan()">Scan Barcode</button>
    <div id="scanner"></div>
  </div>

  <div class="card">
    <input id="food" placeholder="Food">
    <input id="calories" type="number" placeholder="Calories">
    <button onclick="addFood()">Add Manual</button>
  </div>

</div>

<!-- MEALS -->
<div id="meals" class="page">

  <div class="card">

    <h3>Breakfast</h3>
    <label><input type="checkbox" onchange="meal('Eggs',140)"> Eggs</label><br>
    <label><input type="checkbox" onchange="meal('Oatmeal',150)"> Oatmeal</label>

    <h3>Lunch</h3>
    <label><input type="checkbox" onchange="meal('Chicken',200)"> Chicken</label><br>
    <label><input type="checkbox" onchange="meal('Rice',250)"> Rice</label>

    <h3>Dinner</h3>
    <label><input type="checkbox" onchange="meal('Salmon',300)"> Salmon</label><br>
    <label><input type="checkbox" onchange="meal('Veggies',80)"> Veggies</label>

    <h3>Snack</h3>
    <label><input type="checkbox" onchange="meal('Protein Bar',180)"> Protein Bar</label><br>
    <label><input type="checkbox" onchange="meal('Fruit',90)"> Fruit</label>

  </div>

</div>

<!-- TAB BAR -->
<div class="tabbar">

  <div class="tab active" onclick="nav('home')">Home</div>
  <div class="tab" onclick="nav('scan')">Scan</div>
  <div class="tab" onclick="nav('meals')">Meals</div>

</div>

<script>

const today = new Date().toISOString().split("T")[0];

let items = JSON.parse(localStorage.getItem("foods") || "[]");
let goal = Number(localStorage.getItem("goal") || 2000);

/* INIT */
document.getElementById("dateLabel").innerText = today;
document.getElementById("goalInput").value = goal;

/* SAVE */
function save() {
  localStorage.setItem("foods", JSON.stringify(items));
  localStorage.setItem("goal", goal);
}

/* UPDATE GOAL */
function updateGoal() {
  goal = Number(document.getElementById("goalInput").value);
  save();
  render();
}

/* RENDER */
function render() {
  let total = 0;
  const list = document.getElementById("list");
  list.innerHTML = "";

  items.forEach((i, index) => {
    total += i.calories;

    list.innerHTML += `
      <div class="item">
        <span>${i.name}</span>
        <span>${i.calories} cal</span>
        <span class="delete" onclick="deleteItem(${index})">delete</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total + " calories";
  document.getElementById("bar").style.width =
    Math.min((total / goal) * 100, 100) + "%";

  save();
}

/* ADD FOOD */
function addFood(name, cal) {
  const food = name || document.getElementById("food").value;
  const calories = cal || document.getElementById("calories").value;

  if (!food || !calories) return;

  items.push({ name: food, calories: Number(calories) });

  document.getElementById("food").value = "";
  document.getElementById("calories").value = "";

  render();
}

/* DELETE */
function deleteItem(index) {
  items.splice(index, 1);
  render();
}

/* RESET DAY */
function resetDay() {
  items = [];
  render();
}

/* MEALS */
function meal(name, cal) {
  addFood(name, cal);
}

/* NAV */
function nav(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(page).classList.add("active");

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.currentTarget.classList.add("active");
}

/* RENDER INIT */
render();

</script>

</body>
</html>
