<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="apple-touch-icon" href="icon.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial;
  background: #f2f2f7;
}

.header {
  background: white;
  padding: 18px;
  font-size: 22px;
  font-weight: 700;
  position: sticky;
  top: 0;
  border-bottom: 1px solid #eee;
}

.card {
  background: white;
  margin: 12px;
  padding: 16px;
  border-radius: 18px;
}

.title {
  font-size: 14px;
  color: #777;
}

.big {
  font-size: 34px;
  font-weight: 800;
}

.progress {
  height: 10px;
  background: #eee;
  border-radius: 20px;
  overflow: hidden;
  margin-top: 10px;
}

.fill {
  height: 100%;
  width: 0%;
  background: #34c759;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 14px;
  border: none;
  font-size: 16px;
  font-weight: 600;
  color: white;
  background: #007aff;
}

button.green { background: #34c759; }
button.red { background: #ff3b30; }

.item {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid #eee;
}

.small {
  font-size: 12px;
  color: #888;
}

#scanner {
  width: 100%;
  height: 300px;
  border-radius: 12px;
  overflow: hidden;
  margin-top: 10px;
}

/* CONFIRM SHEET (MyFitnessPal style) */
#confirmBox {
  display:none;
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:white;
  padding:20px;
  border-top-left-radius:20px;
  border-top-right-radius:20px;
  box-shadow:0 -2px 20px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<div class="header">🔥 FitTrack</div>

<!-- DASHBOARD -->
<div class="card">
  <div class="title">Today’s Calories</div>
  <div class="big" id="total">0 calories</div>

  <div class="small">Goal: <span id="goalText">2000</span> calories</div>

  <div class="progress">
    <div class="fill" id="bar"></div>
  </div>
</div>

<!-- INPUT -->
<div class="card">
  <input id="food" placeholder="Food name">
  <input id="calories" type="number" placeholder="Calories">

  <button onclick="addFood()">Add Food</button>
  <button class="green" onclick="scan()">Scan Barcode</button>
  <button class="red" onclick="resetDay()">Reset Day</button>
</div>

<!-- LIST -->
<div class="card">
  <div class="title">Today’s Foods</div>
  <div id="list"></div>
</div>

<!-- SCANNER -->
<div class="card">
  <div id="scanner"></div>
</div>

<!-- CONFIRM SHEET -->
<div id="confirmBox">
  <h3>Confirm Food</h3>

  <input id="confirmName" style="width:100%;padding:10px;margin-bottom:10px;border-radius:10px;border:1px solid #ddd;">
  <input id="confirmCalories" type="number" style="width:100%;padding:10px;margin-bottom:10px;border-radius:10px;border:1px solid #ddd;">

  <button onclick="confirmAdd()" class="green">Add Food</button>
  <button onclick="closeConfirm()" class="red">Cancel</button>
</div>

<script>

let items = JSON.parse(localStorage.getItem("foods") || "[]");
const GOAL = 2000;

function render() {
  let total = 0;
  const list = document.getElementById("list");
  list.innerHTML = "";

  items.forEach(i => {
    total += i.calories;

    list.innerHTML += `
      <div class="item">
        <span>${i.name}</span>
        <span>${i.calories} calories</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total + " calories";
  document.getElementById("goalText").innerText = GOAL;

  let percent = Math.min((total / GOAL) * 100, 100);
  document.getElementById("bar").style.width = percent + "%";

  localStorage.setItem("foods", JSON.stringify(items));
}

function addFood(name, cal) {
  const food = name || document.getElementById("food").value;
  const calories = cal || document.getElementById("calories").value;

  if (!food || !calories) return;

  items.push({
    name: food,
    calories: Number(calories)
  });

  document.getElementById("food").value = "";
  document.getElementById("calories").value = "";

  render();
}

function resetDay() {
  items = [];
  localStorage.removeItem("foods");
  render();
}

/* =========================
   BARCODE SCANNER (FIXED)
========================= */

function scan() {
  const scanner = document.getElementById("scanner");
  scanner.innerHTML = "";

  let lastCode = null;
  let lastTime = 0;

  Quagga.init({
    inputStream: {
      type: "LiveStream",
      target: scanner,
      constraints: { facingMode: "environment" }
    },
    decoder: {
      readers: ["ean_reader", "upc_reader"]
    }
  }, function(err) {
    if (err) {
      alert("Camera error");
      return;
    }
    Quagga.start();
  });

  Quagga.onDetected(async function(result) {
    const code = result.codeResult.code;
    const now = Date.now();

    if (code === lastCode && now - lastTime < 3000) return;

    lastCode = code;
    lastTime = now;

    Quagga.stop();

    try {
      const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
      const json = await res.json();

      const p = json.product || {};

      const name = p.product_name || "Unknown Food";

      const calories =
        p?.nutriments?.["energy-kcal_serving"] ||
        p?.nutriments?.["energy-kcal_100g"] ||
        0;

      openConfirm(name, calories);

    } catch (e) {
      alert("Scan failed");
    }
  });
}

/* =========================
   CONFIRM SHEET
========================= */

function openConfirm(name, calories) {
  document.getElementById("confirmName").value = name;
  document.getElementById("confirmCalories").value = calories;

  document.getElementById("confirmBox").style.display = "block";
}

function closeConfirm() {
  document.getElementById("confirmBox").style.display = "none";
}

function confirmAdd() {
  const name = document.getElementById("confirmName").value;
  const calories = document.getElementById("confirmCalories").value;

  addFood(name, calories);

  closeConfirm();

  setTimeout(() => scan(), 500);
}

render();

</script>

</body>
</html>
