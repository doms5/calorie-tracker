<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack Pro Elite</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display";
  background: #f2f2f7;
  color: #111;
}

/* HEADER */
.header {
  text-align:center;
  padding:14px;
  font-weight:700;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(20px);
  border-bottom:1px solid #eee;
}

/* PAGE SYSTEM */
.page { display:none; padding-bottom:90px; }
.active { display:block; }

/* GLASS CARD */
.card {
  background: white;
  margin: 12px;
  padding: 16px;
  border-radius: 22px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.06);
}

/* TEXT */
.big { font-size: 38px; font-weight: 800; }
.small { font-size: 12px; color: #777; }

/* INPUT */
input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:14px;
  border:1px solid #ddd;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:14px;
  border:none;
  background:#007aff;
  color:white;
  font-weight:600;
}

.red { background:#ff3b30; }

/* LIST */
.item {
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #eee;
}

.delete {
  color:#ff3b30;
  font-size:12px;
}

/* TAB BAR */
.tabbar {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:rgba(255,255,255,0.9);
  backdrop-filter: blur(20px);
  border-top:1px solid #ddd;
}

.tab {
  flex:1;
  text-align:center;
  padding:8px 0;
  font-size:11px;
  font-weight:600;
  color:#8e8e93;
}

.tab.active { color:#007aff; }

canvas {
  width:100%;
  height:120px;
}

/* CALENDAR GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.day {
  background:#eee;
  padding:8px;
  border-radius:10px;
  font-size:10px;
  text-align:center;
}

.day.good { background:#34c759; color:white; }
.day.bad { background:#ff3b30; color:white; }

</style>

</head>

<body>

<div class="header">🔥 FitTrack Elite</div>

<!-- HOME -->
<div id="home" class="page active">

  <div class="card">
    <div class="big" id="total">0 calories</div>
    <div class="small">Today: <span id="date"></span></div>
    <div class="small">Streak: 🔥 <span id="streak">0</span> days</div>

    <div style="height:10px;background:#eee;border-radius:20px;margin-top:10px;">
      <div id="bar" style="height:100%;width:0%;background:#34c759;border-radius:20px;"></div>
    </div>

    <button class="red" onclick="resetDay()">Reset Day</button>
  </div>

  <div class="card">
    <div id="list"></div>
  </div>

</div>

<!-- SCAN -->
<div id="scan" class="page">

  <div class="card">
    <button onclick="startScan()">Scan Barcode</button>
    <div id="scanner"></div>
  </div>

  <div class="card">
    <input id="food" placeholder="Food">
    <input id="calories" type="number" placeholder="Calories">
    <button onclick="addFood()">Add</button>
  </div>

</div>

<!-- MEALS -->
<div id="meals" class="page">

  <div class="card">

    <h3>Breakfast</h3>
    <label><input type="checkbox" onchange="meal('Eggs',140)"> Eggs</label>

    <h3>Lunch</h3>
    <label><input type="checkbox" onchange="meal('Chicken',200)"> Chicken</label>

    <h3>Dinner</h3>
    <label><input type="checkbox" onchange="meal('Salmon',300)"> Salmon</label>

    <h3>Snack</h3>
    <label><input type="checkbox" onchange="meal('Protein Bar',180)"> Protein Bar</label>

  </div>

</div>

<!-- HISTORY -->
<div id="history" class="page">

  <div class="card">
    <div class="small">Last 14 Days</div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="card">
    <canvas id="chart"></canvas>
  </div>

</div>

<!-- TAB BAR -->
<div class="tabbar">

  <div class="tab active" onclick="nav('home',0)">🏠<br>Home</div>
  <div class="tab" onclick="nav('scan',1)">📷<br>Scan</div>
  <div class="tab" onclick="nav('meals',2)">🍽️<br>Meals</div>
  <div class="tab" onclick="nav('history',3)">📊<br>Stats</div>

</div>

<script>

const today = new Date().toISOString().split("T")[0];

let db = JSON.parse(localStorage.getItem("db") || "{}");
let items = db[today] || [];
let goal = 2000;

/* INIT */
document.getElementById("date").innerText = today;

/* SAVE */
function save() {
  db[today] = items;
  localStorage.setItem("db", JSON.stringify(db));
}

/* RENDER */
function render() {

  let total = 0;
  let list = document.getElementById("list");
  list.innerHTML = "";

  items.forEach((i, index) => {
    total += i.calories;

    list.innerHTML += `
      <div class="item">
        <span>${i.name}</span>
        <span>${i.calories}</span>
        <span class="delete" onclick="del(${index})">x</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total + " calories";
  document.getElementById("bar").style.width =
    Math.min((total/goal)*100,100) + "%";

  save();
  updateStreak();
  renderHistory();
}

/* ADD */
function addFood(name, cal) {
  const food = name || document.getElementById("food").value;
  const calories = cal || document.getElementById("calories").value;

  items.push({ name: food, calories: Number(calories) });

  document.getElementById("food").value = "";
  document.getElementById("calories").value = "";

  render();
}

/* DELETE */
function del(i) {
  items.splice(i,1);
  render();
}

/* RESET */
function resetDay() {
  items = [];
  render();
}

/* MEALS */
function meal(n,c){ addFood(n,c); }

/* STREAK */
function updateStreak() {
  let streak = 0;
  const keys = Object.keys(db).sort();

  for (let i = keys.length-1; i>=0; i--) {
    let sum = db[keys[i]].reduce((a,b)=>a+b.calories,0);
    if (sum <= goal) streak++;
    else break;
  }

  document.getElementById("streak").innerText = streak;
}

/* HISTORY GRID */
function renderHistory() {
  let grid = document.getElementById("grid");
  if (!grid) return;

  grid.innerHTML = "";

  let keys = Object.keys(db).sort().slice(-14);

  keys.forEach(d => {
    let total = db[d].reduce((a,b)=>a+b.calories,0);

    let div = document.createElement("div");
    div.className = "day " + (total<=goal ? "good":"bad");
    div.innerText = d.split("-")[2];

    grid.appendChild(div);
  });
}

/* SCAN */
function startScan() {
  const scanner = document.getElementById("scanner");
  scanner.innerHTML = "";

  Quagga.init({
    inputStream: { type:"LiveStream", target:scanner },
    decoder: { readers:["ean_reader","upc_reader"] }
  }, err => {
    if (err) return alert(err);
    Quagga.start();
  });

  Quagga.onDetected(async data => {
    const code = data.codeResult.code;
    Quagga.stop();

    const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    const json = await res.json();

    const p = json.product || {};

    addFood(
      p.product_name || "Food",
      p?.nutriments?.["energy-kcal_100g"] || 0
    );
  });
}

/* NAV */
function nav(page, i) {

  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(page).classList.add("active");

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  event.currentTarget.classList.add("active");

}

render();

</script>

</body>
</html>
