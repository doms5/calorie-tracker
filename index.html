<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack Pro</title>

<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>

/* ================= BASE ================= */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display";
  background: #f2f2f7;
  color: #111;
}

/* HEADER */
.header {
  padding: 14px;
  text-align: center;
  font-weight: 700;
  font-size: 20px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(15px);
  border-bottom: 1px solid #eee;
  position: sticky;
  top: 0;
}

/* PAGES */
.page { display: none; padding-bottom: 90px; }
.active { display: block; }

/* CARD */
.card {
  background: white;
  margin: 12px;
  padding: 16px;
  border-radius: 22px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.06);
}

/* TEXT */
.big {
  font-size: 38px;
  font-weight: 800;
}

.small {
  font-size: 12px;
  color: #777;
}

/* PROGRESS */
.progress {
  height: 10px;
  background: #e5e5ea;
  border-radius: 20px;
  overflow: hidden;
}

.fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg,#34c759,#30d158);
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 14px;
  border: 1px solid #ddd;
  font-size: 16px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 14px;
  border: none;
  font-weight: 600;
  color: white;
  background: #007aff;
}

.green { background:#34c759; }
.red { background:#ff3b30; }

/* LIST */
.item {
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #eee;
}

/* ================= TAB BAR (APP STORE STYLE) ================= */
.tabbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 70px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px);
  display: flex;
  border-top: 1px solid #ddd;
}

/* TAB ITEM */
.tab {
  flex: 1;
  text-align: center;
  padding-top: 10px;
  font-size: 11px;
  color: #8e8e93;
  font-weight: 600;
  position: relative;
}

/* ICON STYLE */
.tab span {
  display: block;
  font-size: 20px;
  margin-bottom: 2px;
}

/* ACTIVE TAB */
.tab.active {
  color: #007aff;
}

/* ACTIVE BAR INDICATOR */
.indicator {
  position: absolute;
  bottom: 0;
  height: 3px;
  width: 25%;
  background: #007aff;
  transition: 0.3s;
}

</style>

</head>

<body>

<div class="header">FitTrack Pro</div>

<!-- ================= HOME ================= -->
<div id="home" class="page active">

  <div class="card">
    <div class="big" id="total">0 calories</div>
    <div class="small">Daily Goal: 2000</div>

    <div class="progress">
      <div class="fill" id="bar"></div>
    </div>
  </div>

  <div class="card">
    <div id="list"></div>
  </div>

</div>

<!-- ================= SCAN ================= -->
<div id="scan" class="page">

  <div class="card">
    <button onclick="startScan()">Scan Barcode</button>
    <div id="scanner"></div>
  </div>

  <div class="card">
    <input id="food" placeholder="Food">
    <input id="calories" type="number" placeholder="Calories">
    <button onclick="addFood()">Add Manual</button>
  </div>

</div>

<!-- ================= MEALS ================= -->
<div id="meals" class="page">

  <div class="card">
    <h3>Meal Plan</h3>

    <h4>Breakfast</h4>
    <label><input type="checkbox" onchange="meal('Eggs',140)"> Eggs</label><br>
    <label><input type="checkbox" onchange="meal('Oatmeal',150)"> Oatmeal</label>

    <h4>Lunch</h4>
    <label><input type="checkbox" onchange="meal('Chicken',200)"> Chicken</label><br>
    <label><input type="checkbox" onchange="meal('Rice',250)"> Rice</label>

    <h4>Dinner</h4>
    <label><input type="checkbox" onchange="meal('Salmon',300)"> Salmon</label><br>
    <label><input type="checkbox" onchange="meal('Veggies',80)"> Veggies</label>

  </div>

</div>

<!-- ================= HISTORY ================= -->
<div id="history" class="page">

  <div class="card">
    <div class="small">History coming next upgrade (UI ready)</div>
  </div>

</div>

<!-- ================= TAB BAR ================= -->
<div class="tabbar">

  <div class="tab active" onclick="nav('home',0)">
    <span>🏠</span>Home
  </div>

  <div class="tab" onclick="nav('scan',1)">
    <span>📷</span>Scan
  </div>

  <div class="tab" onclick="nav('meals',2)">
    <span>🍽️</span>Meals
  </div>

  <div class="tab" onclick="nav('history',3)">
    <span>📊</span>History
  </div>

  <div class="indicator" id="indicator"></div>

</div>

<script>

let items = JSON.parse(localStorage.getItem("foods") || "[]");
const GOAL = 2000;

/* ================= RENDER ================= */
function render() {
  let total = 0;
  const list = document.getElementById("list");
  list.innerHTML = "";

  items.forEach(i => {
    total += i.calories;

    list.innerHTML += `
      <div class="item">
        <span>${i.name}</span>
        <span>${i.calories}</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total + " calories";
  document.getElementById("bar").style.width = Math.min((total/GOAL)*100,100) + "%";

  localStorage.setItem("foods", JSON.stringify(items));
}

/* ================= ADD ================= */
function addFood(name, cal) {
  const food = name || document.getElementById("food").value;
  const calories = cal || document.getElementById("calories").value;

  if (!food || !calories) return;

  items.push({ name: food, calories: Number(calories) });

  document.getElementById("food").value = "";
  document.getElementById("calories").value = "";

  render();
}

/* ================= SCAN ================= */
function startScan() {
  const scanner = document.getElementById("scanner");
  scanner.innerHTML = "";

  Quagga.init({
    inputStream: { type:"LiveStream", target:scanner },
    decoder: { readers:["ean_reader","upc_reader"] }
  }, err => {
    if (err) return alert(err);
    Quagga.start();
  });

  Quagga.onDetected(async data => {
    const code = data.codeResult.code;
    Quagga.stop();

    const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    const json = await res.json();

    const p = json.product || {};

    addFood(
      p.product_name || "Food",
      p?.nutriments?.["energy-kcal_100g"] || 0
    );
  });
}

/* ================= MEALS ================= */
function meal(name, cal) {
  addFood(name, cal);
}

/* ================= NAV ================= */
function nav(page, index) {

  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(page).classList.add("active");

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.currentTarget.classList.add("active");

  document.getElementById("indicator").style.left = (index * 25) + "%";
}

render();

</script>

</body>
</html>
